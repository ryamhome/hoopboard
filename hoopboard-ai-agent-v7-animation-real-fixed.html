<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>HoopBoard Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{
  --bg0:#060E18;--bg1:#0A1520;--bg2:#0F1E2F;--bg3:#162535;--bg4:#1D2F42;
  --e1:#FF5E1A;--e2:#FF8C42;--e3:#FFB347;--eg:rgba(255,94,26,.35);
  --a1:#00D4FF;--gn:#00E676;--gn-d:rgba(0,230,118,.15);
  --yw:#FFD600;--rd:#FF3D5A;--rd-d:rgba(255,61,90,.15);
  --t1:#FFF;--t2:rgba(255,255,255,.85);--t3:rgba(255,255,255,.55);--t4:rgba(255,255,255,.3);
  --l1:rgba(255,255,255,.06);--l2:rgba(255,255,255,.1);--l3:rgba(255,255,255,.18);
  --fd:'Barlow Condensed',sans-serif;--ft:'Noto Sans TC',sans-serif;
  --hh:52px;--tbh:58px;--pw:270px;--cw:205px;
  --sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg0);font-family:var(--ft);color:var(--t1);touch-action:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}
header{display:flex;align-items:center;gap:10px;padding:0 14px;height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--l1);flex-shrink:0;z-index:30;position:relative;}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--e1),var(--e2),var(--e3),transparent);opacity:.7;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--e1),var(--e3));display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 16px var(--eg);flex-shrink:0;}
.logo-name{font-family:var(--fd);font-size:17px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-name b{background:linear-gradient(135deg,var(--e1),var(--e3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-tag{font-family:var(--fd);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);}
.room-pill{display:flex;align-items:center;gap:7px;padding:5px 12px;background:rgba(255,255,255,.04);border:1px solid var(--l2);border-radius:20px;cursor:pointer;margin-right:auto;}
.room-pill:hover{background:rgba(255,255,255,.08);}
.room-code{font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:3px;color:var(--e2);}
.room-users{font-size:11px;color:var(--t3);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:lp 2s infinite;}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,230,118,.4);}50%{opacity:.6;box-shadow:0 0 0 4px rgba(0,230,118,0);}}
.live-label{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--gn);text-transform:uppercase;}
.h-acts{display:flex;gap:5px;}
.h-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:6px;border:1px solid var(--l2);background:rgba(255,255,255,.04);color:var(--t3);cursor:pointer;font-size:14px;transition:all .2s;flex-shrink:0;}
.h-btn:hover{background:rgba(255,255,255,.1);color:var(--t1);}
.h-btn.energy{background:linear-gradient(135deg,var(--e1),var(--e2));border-color:transparent;color:#fff;box-shadow:0 0 12px var(--eg);}
.main{flex:1;display:flex;overflow:hidden;min-height:0;}
/* COURT */
.court-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 40%,#0D1B2A 0%,var(--bg0) 70%);}
.court-cw{border-radius:14px;position:relative;box-shadow:0 0 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.07),0 0 20px var(--eg);overflow:hidden;}
/* ★ SVG 球場底圖（最底層）*/
#court-svg{display:block;width:100%;height:100%;border-radius:14px;}
/* ★ canvas 疊在 SVG 上，背景透明，只畫球員/戰術 */
canvas{display:block;touch-action:none;background:transparent;}
#court{position:absolute;top:0;left:0;background:transparent;}
canvas.c-sel{cursor:default;}canvas.c-def{cursor:crosshair;}
/* ★ draw-canvas: 疊在 canvas 上，預設不攔截事件 */
#draw-canvas{position:absolute;top:0;left:0;border-radius:14px;pointer-events:none;z-index:5;}
#draw-canvas.draw-on{pointer-events:all;cursor:crosshair;}
.ov-pill{position:absolute;background:rgba(10,21,32,.94);backdrop-filter:blur(8px);border:1px solid var(--l2);border-radius:20px;display:flex;align-items:center;gap:6px;padding:5px 13px;font-size:10px;white-space:nowrap;pointer-events:none;}
.sync-pill{bottom:12px;left:50%;transform:translateX(-50%);color:var(--gn);border-color:rgba(0,230,118,.2);}
.sync-pill.off{color:var(--rd);border-color:rgba(255,61,90,.2);}
/* 廣播 pill */
.bcast-pill{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(10,21,32,.96);backdrop-filter:blur(10px);border:1px solid rgba(255,215,0,.3);border-radius:12px;padding:8px 16px;display:none;align-items:center;gap:10px;white-space:nowrap;z-index:20;box-shadow:0 0 20px rgba(255,215,0,.15);}
.bcast-pill.show{display:flex;}
.bcast-prog-wrap{width:100px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.bcast-prog-fill{height:100%;background:linear-gradient(90deg,var(--e1),var(--e3));border-radius:2px;}
.bcast-label{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--yw);}
.bcast-frame-info{font-size:10px;color:var(--t3);}
.bcast-btns{display:flex;gap:5px;}
.bcast-react{padding:4px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-family:var(--ft);}
.bcast-like{background:rgba(0,230,118,.12);color:var(--gn);border:1px solid rgba(0,230,118,.25);}
.bcast-pause-req{background:rgba(255,94,26,.12);color:var(--e2);border:1px solid rgba(255,94,26,.25);}
/* 標註工具列 */
.anno-bar{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(10,21,32,.96);border:1px solid var(--l2);border-radius:10px;display:none;flex-direction:column;gap:4px;padding:8px 6px;backdrop-filter:blur(10px);z-index:15;}
.anno-bar.show{display:flex;}
.anno-btn{width:36px;height:36px;border-radius:7px;border:none;background:transparent;color:var(--t4);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.anno-btn:hover{background:rgba(255,255,255,.1);color:var(--t2);}
.anno-btn.act{background:rgba(255,94,26,.2);color:var(--e2);}
.anno-sep{height:1px;background:var(--l2);margin:2px 0;}
.anno-color{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;margin:0 auto;flex-shrink:0;}
.anno-color.act{border-color:#fff;}
/* ★ 永遠顯示的畫圖FAB */
.anno-fab{position:absolute;right:12px;bottom:50px;width:42px;height:42px;border-radius:50%;border:1px solid var(--l2);background:rgba(10,21,32,.92);color:var(--t3);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .2s;z-index:15;}
.anno-fab:hover{background:rgba(255,255,255,.1);color:var(--t1);}
.anno-fab.on{background:rgba(255,94,26,.2);border-color:var(--e1);color:var(--e2);box-shadow:0 0 10px var(--eg);}
/* 播放控制條 */
.anim-bar{position:absolute;bottom:46px;left:50%;transform:translateX(-50%);background:rgba(10,21,32,.96);border:1px solid var(--l2);border-radius:12px;padding:7px 14px;display:none;align-items:center;gap:9px;backdrop-filter:blur(10px);z-index:10;}
.anim-bar.show{display:flex;}
.ap-prog{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--e2);min-width:36px;}
.ap-play{padding:5px 13px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--e1),var(--e2));color:#fff;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--ft);box-shadow:0 0 8px var(--eg);}
.ap-stop{padding:5px 10px;border-radius:7px;border:1px solid var(--l2);background:rgba(255,255,255,.06);color:var(--t2);font-size:10px;cursor:pointer;font-family:var(--ft);}
.spd-g{display:flex;gap:3px;}
.spd-b{padding:3px 7px;border-radius:5px;border:1px solid var(--l2);background:rgba(255,255,255,.05);color:var(--t4);font-size:9px;cursor:pointer;font-weight:600;}
.spd-b.act{background:var(--eg);color:var(--e2);border-color:rgba(255,94,26,.4);}
.ap-track{height:3px;width:80px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.ap-fill{height:100%;background:linear-gradient(90deg,var(--e1),var(--e3));border-radius:2px;transition:width .1s;}
/* 球員名稱 prompt */
.npw{display:none;position:absolute;z-index:60;background:var(--bg3);border:1px solid var(--l2);border-radius:10px;padding:13px;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.npw-lbl{font-size:10px;color:var(--t3);margin-bottom:8px;display:block;font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-family:var(--fd);}
.npw-row{display:flex;gap:6px;margin-bottom:8px;}
.npw-inp{flex:1;padding:7px 9px;border-radius:6px;background:rgba(255,255,255,.07);border:1px solid var(--l2);color:var(--t1);font-size:13px;font-family:var(--ft);outline:none;}
.npw-inp:focus{border-color:var(--e1);}
.npw-num{width:50px;text-align:center;}
.npw-btns{display:flex;gap:6px;}
.npw-ok{flex:1;padding:8px;border-radius:6px;border:none;background:linear-gradient(135deg,var(--e1),var(--e2));color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--ft);}
.npw-skip{flex:1;padding:8px;border-radius:6px;border:1px solid var(--l2);background:rgba(255,255,255,.05);color:var(--t2);font-size:11px;cursor:pointer;font-family:var(--ft);}
.box-select-rect{position:absolute;border:1px dashed var(--yw);background:rgba(255,214,0,.10);pointer-events:none;z-index:8;display:none;}
/* RIGHT PANEL */
.right-panel{width:var(--pw);flex-shrink:0;background:var(--bg2);border-left:1px solid var(--l1);display:flex;flex-direction:column;overflow:hidden;}
.rp-tabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--l1);flex-shrink:0;}
.rp-tab{flex:1;padding:10px 4px;text-align:center;font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.rp-tab:hover{color:var(--t2);}
.rp-tab.act{color:var(--e2);border-bottom-color:var(--e1);}
.rp-body{flex:1;overflow-y:auto;overflow-x:hidden;}
.anim-ctl{padding:12px;background:var(--bg1);border-bottom:1px solid var(--l1);flex-shrink:0;}
.ctl-ttl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ctl-ttl::before{content:'';width:12px;height:2px;background:linear-gradient(90deg,var(--e1),var(--e2));border-radius:1px;}
.ctl-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.ctl-play{padding:7px 14px;border-radius:6px;border:none;background:linear-gradient(135deg,var(--e1),var(--e2));color:#fff;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--ft);flex:1;box-shadow:0 0 10px var(--eg);}
.ctl-stop{padding:7px 10px;border-radius:6px;border:1px solid var(--l2);background:rgba(255,255,255,.05);color:var(--t2);font-size:10px;cursor:pointer;font-family:var(--ft);}
.ctl-add{padding:7px 10px;border-radius:6px;border:1px solid rgba(0,230,118,.25);background:var(--gn-d);color:var(--gn);font-size:10px;font-weight:700;cursor:pointer;font-family:var(--ft);}
.ctl-prog{font-family:var(--fd);font-size:13px;font-weight:900;color:var(--e2);min-width:38px;text-align:right;}
.ctl-track{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.ctl-fill{height:100%;background:linear-gradient(90deg,var(--e1),var(--e3));border-radius:2px;width:0%;}
.bcast-ctl{padding:10px 12px;background:rgba(0,212,255,.04);border-bottom:1px solid rgba(0,212,255,.1);flex-shrink:0;}
.bcast-ctl-title{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--a1);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.bcast-ctl-title::before{content:'';width:10px;height:2px;background:var(--a1);border-radius:1px;}
.bcast-main-btn{width:100%;padding:9px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--ft);transition:all .2s;margin-bottom:6px;}
.bcast-main-btn.idle{background:linear-gradient(135deg,var(--a1),#0099BB);color:#000;}
.bcast-main-btn.live{background:linear-gradient(135deg,var(--e1),var(--e2));color:#fff;box-shadow:0 0 14px var(--eg);}
.bcast-desc{font-size:9px;color:var(--t4);line-height:1.6;}
.frame-list{flex:1;overflow-y:auto;padding:8px;}
.fi{border-radius:10px;border:1px solid var(--l1);background:var(--bg3);margin-bottom:6px;cursor:pointer;transition:all .2s;overflow:hidden;position:relative;user-select:none;}
.fi:hover{border-color:var(--l3);background:var(--bg4);}
.fi.act{border-color:var(--e1);background:linear-gradient(135deg,rgba(255,94,26,.12),rgba(255,140,66,.06));box-shadow:0 0 12px rgba(255,94,26,.2);}
.fi.act::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--e1),var(--e3));border-radius:3px 0 0 3px;}
.fi.dragging{opacity:.35;border-style:dashed;}
.fi.drag-over{border-color:var(--a1);background:rgba(0,212,255,.06);}
.fi-hdr{display:flex;align-items:center;gap:6px;padding:7px 10px;}
.fi-drag{font-size:13px;color:var(--t4);cursor:grab;flex-shrink:0;}
.fi-num{font-family:var(--fd);font-size:13px;font-weight:900;width:20px;color:var(--e2);flex-shrink:0;}
.fi-name{flex:1;font-size:10px;font-weight:500;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:text;}
.fi-name-inp{display:none;flex:1;background:transparent;border:none;border-bottom:1px solid var(--e1);color:var(--t1);font-size:10px;font-family:var(--ft);outline:none;padding:0;}
.fi-acts{display:flex;gap:2px;flex-shrink:0;}
.fa-btn{width:22px;height:22px;border:none;background:transparent;color:var(--t4);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:5px;}
.fa-btn:hover{background:rgba(255,255,255,.1);color:var(--t1);}
.fa-btn.del:hover{background:var(--rd-d);color:var(--rd);}
.fi-prev{padding:0 8px 8px;}
.fi-canvas{border-radius:6px;display:block;width:100%;background:#07111B;}
.tp-body{padding:12px;}
.tp-sec{margin-bottom:16px;}
.tp-ttl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.tp-ttl::before{content:'';width:10px;height:2px;background:linear-gradient(90deg,var(--e1),var(--e2));border-radius:1px;}
.c-swatches{display:flex;gap:6px;flex-wrap:wrap;}
.c-sw{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
.c-sw:hover{transform:scale(1.15);}
.c-sw.act{border-color:#fff;transform:scale(1.1);}
.sz-row{display:flex;align-items:center;gap:10px;}
.sz-slider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer;}
.sz-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--e1),var(--e2));cursor:pointer;}
.sz-val{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--e2);min-width:22px;}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.tc-card{padding:9px 6px;border-radius:10px;background:var(--bg3);border:1px solid var(--l1);cursor:pointer;text-align:center;transition:all .2s;}
.tc-card:hover{border-color:rgba(255,94,26,.4);background:rgba(255,94,26,.08);}
.tc-card:active{transform:scale(.97);}
.tc-icon{font-size:18px;display:block;margin-bottom:3px;}
.tc-label{font-size:9px;color:var(--t3);font-weight:600;line-height:1.3;}
.tc-label.danger{color:var(--rd);}
/* CHAT */
.chat-panel{width:var(--cw);flex-shrink:0;background:var(--bg2);border-left:1px solid var(--l1);display:flex;flex-direction:column;}
.chat-hdr{padding:9px 12px;border-bottom:1px solid var(--l1);flex-shrink:0;display:flex;align-items:center;gap:6px;}
.chat-title{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);flex:1;display:flex;align-items:center;gap:5px;}
.chat-title::before{content:'';width:10px;height:2px;background:var(--a1);border-radius:1px;}
.chat-unread{background:var(--e1);color:#fff;border-radius:8px;padding:0 5px;font-size:8px;font-weight:700;display:none;}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth;}
.msg{display:flex;flex-direction:column;gap:1px;}
.msg-top{display:flex;align-items:center;gap:4px;}
.msg-av{width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0;}
.msg-who{font-size:9px;font-weight:700;color:var(--e2);}
.msg-who.me{color:var(--gn);}
.msg-when{font-size:8px;color:var(--t4);}
.msg-body{font-size:10px;padding:4px 8px;line-height:1.4;word-break:break-all;background:rgba(255,255,255,.05);border-radius:0 7px 7px 7px;margin-left:17px;}
.msg-body.mine{background:rgba(255,94,26,.12);border:1px solid rgba(255,94,26,.15);border-radius:7px 0 7px 7px;}
.msg-stk{font-size:22px;margin-left:17px;}
.msg-sys{font-size:9px;color:var(--t4);text-align:center;font-style:italic;padding:2px 0;}
.msg-react{font-size:10px;text-align:center;padding:3px 0;color:var(--yw);}
.msg-pause{font-size:10px;text-align:center;padding:3px 0;color:var(--e2);}
.msg-likes{margin-left:17px;display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;}
.like-btn{font-size:9px;padding:1px 5px;border-radius:7px;border:1px solid var(--l1);background:rgba(255,255,255,.04);cursor:pointer;color:var(--t4);}
.like-btn:hover,.like-btn.liked{background:rgba(255,94,26,.12);border-color:rgba(255,94,26,.3);color:var(--e2);}
.chat-ia{flex-shrink:0;border-top:1px solid var(--l1);}
.stk-strip{display:flex;gap:2px;padding:4px 8px;overflow-x:auto;}
.stk-strip::-webkit-scrollbar{display:none;}
.stk-btn{font-size:16px;cursor:pointer;padding:2px;border:none;background:transparent;flex-shrink:0;}
.chat-row{display:flex;gap:5px;padding:5px 8px;}
.chat-inp{flex:1;padding:7px 10px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid var(--l2);color:var(--t1);font-size:11px;font-family:var(--ft);outline:none;min-width:0;}
.chat-inp:focus{border-color:var(--e1);}
.chat-send{padding:7px 10px;border-radius:6px;border:none;background:linear-gradient(135deg,var(--e1),var(--e2));color:#fff;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--ft);flex-shrink:0;}
/* TOOLBAR */
.btb{display:flex;align-items:center;height:var(--tbh);flex-shrink:0;background:var(--bg2);border-top:1px solid var(--l1);padding:0 6px;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:var(--sb);min-height:calc(var(--tbh) + var(--sb));}
.btb::-webkit-scrollbar{display:none;}
.tb-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:50px;height:48px;border-radius:6px;border:none;background:transparent;color:var(--t4);cursor:pointer;gap:3px;flex-shrink:0;transition:all .15s;}
.tb-btn svg{width:18px;height:18px;}
.tb-btn span{font-size:8px;font-weight:600;white-space:nowrap;font-family:var(--fd);}
.tb-btn:hover{background:rgba(255,255,255,.07);color:var(--t2);}
.tb-btn.act{background:rgba(255,94,26,.12);color:var(--e2);border:1px solid rgba(255,94,26,.25);}
.tb-sep{width:1px;height:32px;flex-shrink:0;margin:0 3px;background:linear-gradient(180deg,transparent,var(--l2),transparent);}
@media(max-width:600px){
  .right-panel{display:none;}
  .chat-panel{width:100%;height:160px;border-left:none;border-top:1px solid var(--l1);flex-direction:row;}
  .chat-msgs-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .chat-inp-wrap{width:150px;flex-shrink:0;border-left:1px solid var(--l1);display:flex;flex-direction:column;}
  .main{flex-direction:column;}
  .stk-strip{display:none;}
}
@media(min-width:601px){.chat-msgs-wrap{display:contents;}.chat-inp-wrap{display:contents;}}
/* SETUP */
.su-ov{position:fixed;inset:0;background:var(--bg0);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 30% 20%,rgba(255,94,26,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,212,255,.05) 0%,transparent 50%);}
.su-box{background:var(--bg2);border:1px solid var(--l2);border-radius:20px;padding:28px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.6);position:relative;overflow:hidden;}
.su-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--e1),var(--e2),var(--e3));}
.su-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.su-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--e1),var(--e3));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px var(--eg);}
.su-title{font-family:var(--fd);font-size:26px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.su-title span{color:var(--e2);}
.su-sub{font-size:8px;color:var(--t4);letter-spacing:3px;text-transform:uppercase;font-family:var(--fd);}
.su-desc{font-size:11px;color:var(--t3);margin:16px 0 14px;line-height:1.8;}
.su-desc b{color:var(--t1);}
.s-inp{width:100%;padding:11px 13px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid var(--l2);color:var(--t1);font-size:14px;margin-bottom:10px;font-family:var(--ft);outline:none;}
.s-inp:focus{border-color:var(--e1);}
.s-row{display:flex;gap:8px;margin-bottom:10px;}
.s-btn{flex:1;padding:12px;border-radius:6px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ft);}
.s-pri{background:linear-gradient(135deg,var(--e1),var(--e2));color:#fff;box-shadow:0 0 14px var(--eg);}
.s-sec{background:rgba(255,255,255,.06);color:var(--t2);border:1px solid var(--l2);}
.s-note{font-size:10px;color:var(--t4);line-height:1.8;background:rgba(255,255,255,.03);border-radius:6px;padding:10px 12px;border:1px solid var(--l1);}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-ov.show{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--l2);border-radius:14px;padding:22px;width:100%;max-width:320px;position:relative;overflow:hidden;}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--a1),var(--e1));}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:1px;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--t3);margin-bottom:14px;}
.m-link-row{display:flex;gap:6px;margin-bottom:11px;}
.m-link-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--l2);border-radius:6px;padding:7px 10px;color:var(--t2);font-size:10px;font-family:monospace;}
.m-copy{padding:7px 12px;border-radius:6px;border:none;background:linear-gradient(135deg,var(--e1),var(--e2));color:#fff;font-size:10px;font-weight:700;cursor:pointer;}
.m-share-row{display:flex;gap:6px;margin-bottom:12px;}
.m-share-opt{flex:1;padding:9px 6px;border-radius:6px;border:1px solid var(--l2);background:rgba(255,255,255,.04);color:var(--t2);font-size:10px;cursor:pointer;text-align:center;}
.m-share-opt:hover{border-color:rgba(255,94,26,.4);}
.m-share-opt span{display:block;font-size:18px;margin-bottom:3px;}
.m-close{width:100%;padding:8px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid var(--l2);color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--ft);}
</style>
</head>
<body>

<div class="su-ov" id="su-ov">
  <div class="su-box">
    <div class="su-logo">
      <div class="su-icon">🏀</div>
      <div><div class="su-title">HOOP<span>BOARD</span></div><div class="su-sub">Pro Tactics Editor</div></div>
    </div>
    <p class="su-desc">選擇你的身份：<br>• <b>建立新房間</b> — 產生連結分享給隊友<br>• <b>加入房間</b> — 輸入教練的代碼</p>
    <input class="s-inp" id="su-n" placeholder="你的名稱（例：教練、彥）" maxlength="10" autocomplete="off"/>
    <div class="s-row">
      <button class="s-btn s-pri" onclick="createRoom()">🆕 建立房間</button>
      <button class="s-btn s-sec" onclick="showJoin()">🔗 加入</button>
    </div>
    <div id="join-area" style="display:none;margin-bottom:10px">
      <input class="s-inp" id="su-c" placeholder="房間代碼（例：ATK-7X2）" maxlength="10" style="text-transform:uppercase;margin-bottom:8px" autocomplete="off"/>
      <button class="s-btn s-pri" onclick="joinRoom()" style="width:100%">✅ 加入房間</button>
    </div>
    <div class="s-note">🔒 Firebase 即時同步<br><span id="fb-st" style="color:var(--e2)">⏳ 連線中...</span></div>
  </div>
</div>

<div id="app" style="display:none">
<header>
  <div class="logo">
    <div class="logo-icon">🏀</div>
    <div style="display:flex;flex-direction:column;line-height:1">
      <div class="logo-name">HOOP<b>BOARD</b></div>
      <div class="logo-tag">Pro Tactics</div>
    </div>
  </div>
  <div class="room-pill" onclick="document.getElementById('share-modal').classList.add('show')">
    <div style="display:flex;align-items:center;gap:4px"><div class="live-dot"></div><span class="live-label">Live</span></div>
    <span class="room-code" id="rc">------</span>
    <span class="room-users" id="on-n">0人</span>
  </div>
  <div class="h-acts">
    <button class="h-btn" onclick="undoAct()">↩</button>
    <button class="h-btn" onclick="exportImg()">📸</button>
    <button class="h-btn" onclick="document.getElementById('share-modal').classList.add('show')">🔗</button>
    <button class="h-btn energy" onclick="saveTactic()">💾</button>
  </div>
</header>

<div class="main">
  <div class="court-wrap" id="ca">
    <div class="court-cw" id="court-cw-el">
      <!-- ★ SVG 球場底圖（viewBox 0 0 3000 1700，含 1m=100px 邊界）-->
      <!-- 球場本體 2800×1500，四邊各 100px 邊界 -->
      <svg id="court-svg" viewBox="0 0 3000 1700" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- 木地板漸層 -->
          <linearGradient id="floor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#8B5E2A"/>
            <stop offset="35%"  stop-color="#A0703A"/>
            <stop offset="50%"  stop-color="#B07840"/>
            <stop offset="65%"  stop-color="#A0703A"/>
            <stop offset="100%" stop-color="#8B5E2A"/>
          </linearGradient>
          <!-- 中央光暈 -->
          <radialGradient id="court-glow" cx="50%" cy="50%" r="40%">
            <stop offset="0%"   stop-color="rgba(255,200,100,0.07)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
          <!-- 橘色籃框光暈 -->
          <filter id="basket-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <!-- 用於 clipPath 確保線條不超出球場 -->
          <clipPath id="court-clip">
            <rect x="100" y="100" width="2800" height="1500" rx="0"/>
          </clipPath>
        </defs>

        <!-- 場外暗色背景 -->
        <rect x="0" y="0" width="3000" height="1700" fill="#07111C"/>

        <!-- 木地板 -->
        <rect x="100" y="100" width="2800" height="1500" fill="url(#floor-grad)"/>

        <!-- 木紋（水平細線）-->
        <g opacity="0.06" stroke="#3D1A00" stroke-width="0.5" clip-path="url(#court-clip)">
          <!-- 每 38px 一條（約 0.38m）-->
          <line x1="100" y1="138" x2="2900" y2="138"/>
          <line x1="100" y1="176" x2="2900" y2="176"/>
          <line x1="100" y1="214" x2="2900" y2="214"/>
          <line x1="100" y1="252" x2="2900" y2="252"/>
          <line x1="100" y1="290" x2="2900" y2="290"/>
          <line x1="100" y1="328" x2="2900" y2="328"/>
          <line x1="100" y1="366" x2="2900" y2="366"/>
          <line x1="100" y1="404" x2="2900" y2="404"/>
          <line x1="100" y1="442" x2="2900" y2="442"/>
          <line x1="100" y1="480" x2="2900" y2="480"/>
          <line x1="100" y1="518" x2="2900" y2="518"/>
          <line x1="100" y1="556" x2="2900" y2="556"/>
          <line x1="100" y1="594" x2="2900" y2="594"/>
          <line x1="100" y1="632" x2="2900" y2="632"/>
          <line x1="100" y1="670" x2="2900" y2="670"/>
          <line x1="100" y1="708" x2="2900" y2="708"/>
          <line x1="100" y1="746" x2="2900" y2="746"/>
          <line x1="100" y1="784" x2="2900" y2="784"/>
          <line x1="100" y1="822" x2="2900" y2="822"/>
          <line x1="100" y1="860" x2="2900" y2="860"/>
          <line x1="100" y1="898" x2="2900" y2="898"/>
          <line x1="100" y1="936" x2="2900" y2="936"/>
          <line x1="100" y1="974" x2="2900" y2="974"/>
          <line x1="100" y1="1012" x2="2900" y2="1012"/>
          <line x1="100" y1="1050" x2="2900" y2="1050"/>
          <line x1="100" y1="1088" x2="2900" y2="1088"/>
          <line x1="100" y1="1126" x2="2900" y2="1126"/>
          <line x1="100" y1="1164" x2="2900" y2="1164"/>
          <line x1="100" y1="1202" x2="2900" y2="1202"/>
          <line x1="100" y1="1240" x2="2900" y2="1240"/>
          <line x1="100" y1="1278" x2="2900" y2="1278"/>
          <line x1="100" y1="1316" x2="2900" y2="1316"/>
          <line x1="100" y1="1354" x2="2900" y2="1354"/>
          <line x1="100" y1="1392" x2="2900" y2="1392"/>
          <line x1="100" y1="1430" x2="2900" y2="1430"/>
          <line x1="100" y1="1468" x2="2900" y2="1468"/>
          <line x1="100" y1="1506" x2="2900" y2="1506"/>
          <line x1="100" y1="1544" x2="2900" y2="1544"/>
          <line x1="100" y1="1582" x2="2900" y2="1582"/>
        </g>

        <!-- 中央光暈 overlay -->
        <rect x="100" y="100" width="2800" height="1500" fill="url(#court-glow)"/>

        <!-- ══ 球場線條（1m=100px，場地原點 x=100, y=100）══ -->
        <g clip-path="url(#court-clip)" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

          <!-- 禁區底色（左）：x=100~680, y=355~1145 (5.8m×4.9m) -->
          <rect x="100" y="605" width="580" height="490" fill="rgba(28,60,130,0.28)" stroke="none"/>
          <!-- 禁區底色（右）：x=2320~2900, y=355~1145 -->
          <rect x="2320" y="605" width="580" height="490" fill="rgba(28,60,130,0.28)" stroke="none"/>

          <!-- 場地外框 -->
          <rect x="100" y="100" width="2800" height="1500" stroke="rgba(255,255,255,0.88)" stroke-width="3"/>

          <!-- 中線 -->
          <line x1="1500" y1="100" x2="1500" y2="1600"/>

          <!-- 中圈（半徑 1.8m = 180px）-->
          <circle cx="1500" cy="850" r="180"/>

          <!-- 中心點 -->
          <circle cx="1500" cy="850" r="6" fill="rgba(255,255,255,0.88)" stroke="none"/>

          <!-- ══ 左半場 ══ -->
          <!-- 禁區邊線 -->
          <line x1="100"  y1="605"  x2="680"  y2="605"/>   <!-- 禁區上邊：FIBA 4.9m 寬 -->
          <line x1="100"  y1="1095" x2="680"  y2="1095"/>  <!-- 禁區下邊 -->
          <line x1="680"  y1="605"  x2="680"  y2="1095"/>  <!-- 罰球線 -->

          <!-- 禁區刻度（距底線 175, 275, 375px = 1.75m, 2.75m, 3.75m）-->
          <line x1="275" y1="605"  x2="275" y2="585"/>
          <line x1="275" y1="1095" x2="275" y2="1115"/>
          <line x1="375" y1="605"  x2="375" y2="585"/>
          <line x1="375" y1="1095" x2="375" y2="1115"/>
          <line x1="475" y1="605"  x2="475" y2="585"/>
          <line x1="475" y1="1095" x2="475" y2="1115"/>

          <!-- 罰球圈（圓心 (680,850)，半徑 180px；朝籃框側實線，朝場中虛線）-->
          <!-- 朝籃框實線半圓：從 top (680,670) 到 bot (680,1030)，往左 -->
          <path d="M 680 670 A 180 180 0 0 0 680 1030"/>
          <!-- 朝場中虛線半圓 -->
          <path d="M 680 670 A 180 180 0 0 1 680 1030" stroke-dasharray="28 18"/>

          <!-- 限制區弧（圓心籃框 (257.5,850)，半徑 125px）-->
          <path d="M 257.5 725 A 125 125 0 0 1 257.5 975"/>

          <!-- 三分線：底角直線 -->
          <!-- 上方：(100,190) → (400,190)，即 y=0.9m=90px → y=100+90=190 -->
          <line x1="100"  y1="190"  x2="400"  y2="190"/>
          <!-- 下方：(100,1510) → (400,1510)，即 y=14.1m → y=100+1410=1510 -->
          <line x1="100"  y1="1510" x2="400"  y2="1510"/>
          <!-- 三分弧：圓心籃框(257.5,850)，從上端點到下端點 -->
          <!-- 上端點(400,190) 角度：atan2(190-850, 400-257.5) = atan2(-660, 142.5) -->
          <!-- 下端點(400,1510) 角度：atan2(1510-850, 400-257.5) = atan2(660, 142.5) -->
          <!-- 半徑 = sqrt(142.5²+660²) ≈ 675px = 6.75m ✓ -->
          <path d="M 400 190 A 675 675 0 0 1 400 1510"/>

          <!-- 籃板（面距底線 142.5px=1.425m，半寬 91.5px=0.915m）-->
          <line x1="242.5" y1="758.5" x2="242.5" y2="941.5" stroke-width="5"/>

          <!-- 籃框（圓心距底線 157.5px=1.575m）-->
          <circle cx="257.5" cy="850" r="22.5" stroke="#FF5E1A" stroke-width="5" filter="url(#basket-glow)"/>

          <!-- ══ 右半場（左右鏡像）══ -->
          <!-- 禁區邊線 -->
          <line x1="2900" y1="605"  x2="2320" y2="605"/>
          <line x1="2900" y1="1095" x2="2320" y2="1095"/>
          <line x1="2320" y1="605"  x2="2320" y2="1095"/>

          <!-- 禁區刻度 -->
          <line x1="2725" y1="605"  x2="2725" y2="585"/>
          <line x1="2725" y1="1095" x2="2725" y2="1115"/>
          <line x1="2625" y1="605"  x2="2625" y2="585"/>
          <line x1="2625" y1="1095" x2="2625" y2="1115"/>
          <line x1="2525" y1="605"  x2="2525" y2="585"/>
          <line x1="2525" y1="1095" x2="2525" y2="1115"/>

          <!-- 罰球圈（圓心 (2320,850)）-->
          <path d="M 2320 670 A 180 180 0 0 1 2320 1030"/>
          <path d="M 2320 670 A 180 180 0 0 0 2320 1030" stroke-dasharray="28 18"/>

          <!-- 限制區弧（圓心籃框 (2742.5,850)）-->
          <path d="M 2742.5 725 A 125 125 0 0 0 2742.5 975"/>

          <!-- 三分線：底角直線 -->
          <line x1="2900" y1="190"  x2="2600" y2="190"/>
          <line x1="2900" y1="1510" x2="2600" y2="1510"/>
          <!-- 三分弧：圓心 (2742.5,850) 右側 -->
          <path d="M 2600 190 A 675 675 0 0 0 2600 1510"/>

          <!-- 籃板（右側）-->
          <line x1="2757.5" y1="758.5" x2="2757.5" y2="941.5" stroke-width="5"/>

          <!-- 籃框（右側）-->
          <circle cx="2742.5" cy="850" r="22.5" stroke="#FF5E1A" stroke-width="5" filter="url(#basket-glow)"/>

        </g>
      </svg>
      <!-- ★ canvas 疊加：背景透明，只畫球員/球/戰術線 -->
      <canvas id="court" class="c-def" style="position:absolute;top:0;left:0;z-index:2;background:transparent;"></canvas>
      <!-- draw-canvas 疊在最上方，畫圖標註用 -->
      <canvas id="draw-canvas"></canvas>
    </div>
    <div id="box-select-rect" class="box-select-rect"></div>
    <!-- 廣播 pill（全體可見） -->
    <div class="bcast-pill" id="bcast-pill">
      <span class="bcast-label" id="bcast-label">▶ 播放中</span>
      <div class="bcast-prog-wrap"><div class="bcast-prog-fill" id="bcast-fill" style="width:0%"></div></div>
      <span class="bcast-frame-info" id="bcast-frame-info"></span>
      <div class="bcast-btns">
        <button class="bcast-react bcast-like" onclick="sendReaction('👍')">👍 讚</button>
        <button class="bcast-react bcast-pause-req" onclick="sendPauseRequest()">✋ 暫停</button>
      </div>
    </div>
    <!-- 標註工具列（畫圖模式時） -->
    <div class="anno-bar" id="anno-bar">
      <button class="anno-btn act" id="anno-pen-btn" onclick="setAnnoTool('pen',this)" title="畫筆">✏️</button>
      <button class="anno-btn" id="anno-arr-btn" onclick="setAnnoTool('arrow',this)" title="箭頭">→</button>
      <button class="anno-btn" onclick="clearAnno()" title="清除">🗑</button>
      <div class="anno-sep"></div>
      <div id="anno-colors"></div>
    </div>
    <!-- ★ 永遠顯示的畫圖開關 FAB -->
    <button class="anno-fab" id="anno-fab" onclick="toggleAnno()" title="開啟/關閉畫圖討論">✏️</button>
    <!-- 播放控制條（主持人） -->
    <div class="anim-bar" id="anim-bar">
      <span style="font-size:10px;color:var(--t3)">動畫</span>
      <div class="ap-track"><div class="ap-fill" id="ap-fill"></div></div>
      <span class="ap-prog" id="ap-prog">0%</span>
      <div class="spd-g">
        <button class="spd-b" onclick="setSpd(.5,this)">.5x</button>
        <button class="spd-b act" onclick="setSpd(1,this)">1x</button>
        <button class="spd-b" onclick="setSpd(2,this)">2x</button>
      </div>
      <button class="ap-play" id="ap-pb" onclick="window.toggleAnim()">▶ 播放</button>
      <button class="ap-stop" onclick="window.stopAnim()">■ 停止</button>
    </div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,set,push,onValue,onChildAdded,onDisconnect,serverTimestamp,query,limitToLast,get,remove}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const FC={apiKey:"AIzaSyAd5oCNcMUiY3G1tV8djs03Ig83DeRKrqk",authDomain:"basketball-tactics.firebaseapp.com",databaseURL:"https://basketball-tactics-default-rtdb.firebaseio.com",projectId:"basketball-tactics",storageBucket:"basketball-tactics.firebasestorage.app",messagingSenderId:"342499390591",appId:"1:342499390591:web:055c4443ca8400283efb4a"};
const AVC=['#FF5E1A','#2979FF','#00C853','#FFD600','#AA00FF','#FF1744','#00BCD4'];
let db,roomId,myName,myId,remoteUpd=false,unreadN=0;
window.__isHost=false;
try{const app=initializeApp(FC);db=getDatabase(app);document.getElementById('fb-st').textContent='✅ Firebase 連線成功';document.getElementById('fb-st').style.color='var(--gn)';}
catch(e){document.getElementById('fb-st').textContent='❌ '+e.message;document.getElementById('fb-st').style.color='var(--rd)';}
function genId(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<3;i++)s+=c[~~(Math.random()*c.length)];s+='-';for(let i=0;i<3;i++)s+=c[~~(Math.random()*c.length)];return s;}
window.createRoom=()=>{const n=document.getElementById('su-n').value.trim();if(!n){alert('請輸入名稱！');return;}roomId=genId();myName=n;myId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);window.__isHost=true;go();};
window.showJoin=()=>document.getElementById('join-area').style.display='block';
window.joinRoom=()=>{const n=document.getElementById('su-n').value.trim(),c=document.getElementById('su-c').value.trim().toUpperCase();if(!n||!c){alert('請輸入名稱和代碼！');return;}roomId=c;myName=n;myId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);window.__isHost=false;go();};
const urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom){document.getElementById('su-c').value=urlRoom;document.getElementById('join-area').style.display='block';}
function go(){
  document.getElementById('su-ov').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('rc').textContent=roomId;
  document.getElementById('share-link').value=location.origin+location.pathname+'?room='+roomId;
  initCourtDims();initUI();buildStickers();render();
  if(!db){document.getElementById('sync-txt').textContent='⚠️ 單機模式';document.getElementById('sync-pill').classList.add('off');return;}
  const myColor=AVC[~~(Math.random()*AVC.length)];
  const presRef=ref(db,'rooms/'+roomId+'/presence/'+myId);
  set(presRef,{name:myName,color:myColor,isHost:window.__isHost,ts:serverTimestamp()});
  onDisconnect(presRef).remove();
  onValue(ref(db,'rooms/'+roomId+'/presence'),snap=>{const users=Object.values(snap.val()||{});document.getElementById('on-n').textContent=users.length+'人';window.__users=users;});
  onValue(ref(db,'rooms/'+roomId+'/state'),snap=>{const d=snap.val();if(!d)return;remoteUpd=true;if(Array.isArray(d.frames))frames=d.frames;curFrame=Math.min(curFrame,frames.length-1);remoteUpd=false;render();renderFrameList();});
  onValue(ref(db,'rooms/'+roomId+'/broadcast'),snap=>{const d=snap.val();if(!d){hideBcast();return;}handleBcast(d);});
  onValue(ref(db,'rooms/'+roomId+'/anno'),snap=>{const d=snap.val();if(!d||!d.strokes){clearDC();return;}redrawAnno(d.strokes);});
  let fl=true;
  onChildAdded(query(ref(db,'rooms/'+roomId+'/chat'),limitToLast(80)),snap=>{const m=snap.val();if(!m)return;appendMsg(m,snap.key,fl);if(fl)return;if(m.uid!==myId){unreadN++;const b=document.getElementById('chat-unread');if(b){b.textContent=unreadN;b.style.display='inline-block';}}});
  setTimeout(()=>fl=false,1500);
  document.getElementById('chat-inp').addEventListener('focus',()=>{unreadN=0;const b=document.getElementById('chat-unread');if(b)b.style.display='none';});
  onValue(ref(db,'rooms/'+roomId+'/likes'),snap=>{const data=snap.val()||{};document.querySelectorAll('.like-btn').forEach(btn=>{const mk=btn.dataset.mk,em=btn.dataset.em;if(!mk||!em)return;const cnt=data[mk]?data[mk][em]?Object.keys(data[mk][em]).length:0:0;btn.textContent=em+(cnt>0?' '+cnt:'');btn.classList.toggle('liked',!!(data[mk]&&data[mk][em]&&data[mk][em][myId]));});});
  document.getElementById('sync-txt').textContent='即時同步中';
  sysMsg(myName+' 加入了房間 🏀');
}
// BROADCAST
window.__bcastOn=false;
window.startBcast=()=>{if(!db||!window.__isHost)return;window.__bcastOn=true;const bb=document.getElementById('bcast-main-btn');if(bb){bb.className='bcast-main-btn live';bb.textContent='📡 廣播中（點擊結束）';}set(ref(db,'rooms/'+roomId+'/broadcast'),{on:true,animT:0,playing:false,frameCount:frames.length,hostId:myId,startedAt:Date.now()});document.getElementById('anim-bar').classList.add('show');sysMsg(myName+' 開始廣播 📡');setTimeout(()=>{if(window.__bcastOn&&window.playAll)window.playAll();},80);};
window.stopBcast=()=>{if(!db||!window.__isHost)return;window.__bcastOn=false;stopAnim(false);set(ref(db,'rooms/'+roomId+'/broadcast'),null);set(ref(db,'rooms/'+roomId+'/anno'),null);const bb=document.getElementById('bcast-main-btn');if(bb){bb.className='bcast-main-btn idle';bb.textContent='📡 開始廣播並播放';}document.getElementById('anim-bar').classList.remove('show');hideBcast();clearDC();sysMsg(myName+' 結束廣播');};
window.toggleBcast=()=>{if(window.__bcastOn)window.stopBcast();else window.startBcast();};
window.__pushBcast=(t,playing)=>{if(!db||!window.__isHost||!window.__bcastOn)return;set(ref(db,'rooms/'+roomId+'/broadcast'),{on:true,animT:t,playing,frameCount:frames.length,hostId:myId,curFrame});};
function handleBcast(d){if(!d||!d.on){hideBcast();return;}showBcast();const prog=Math.round((d.animT||0)*100);document.getElementById('bcast-fill').style.width=prog+'%';const fi=Math.min(Math.floor((d.animT||0)*(d.frameCount-1)),d.frameCount-2);document.getElementById('bcast-frame-info').textContent='幀'+(fi+1)+'/'+d.frameCount;document.getElementById('bcast-label').textContent=d.playing?'▶ 播放中':'⏸ 暫停中';if(!window.__isHost&&d.playing)renderBcastFrame(d.animT||0,d.frameCount);}
function renderBcastFrame(t,fc){const total=Math.min(fc,frames.length);if(total<2)return;const p=t*(total-1),fi=Math.min(Math.floor(p),total-2),frac=p-fi;const f0=frames[fi],f1=frames[fi+1];if(!f0||!f1)return;const maxP=Math.max(f0.players.length,f1.players.length);const intP=[];for(let i=0;i<maxP;i++){const p0=f0.players[i],p1=f1.players[i];if(p0&&p1)intP.push({...p0,x:lerp(p0.x,p1.x,frac),y:lerp(p0.y,p1.y,frac)});else if(p0)intP.push({...p0});else if(p1)intP.push({...p1});}const intBall=f0.ball&&f1.ball?{...f0.ball,x:lerp(f0.ball.x,f1.ball.x,frac),y:lerp(f0.ball.y,f1.ball.y,frac)}:f0.ball;ct.clearRect(0,0,CW,CH);renderFrameData({...f0,players:intP,ball:intBall});}
function showBcast(){document.getElementById('bcast-pill').classList.add('show');}
function hideBcast(){document.getElementById('bcast-pill').classList.remove('show');}
window.sendReaction=(e)=>{if(!db)return;push(ref(db,'rooms/'+roomId+'/chat'),{uid:myId,name:myName,text:e+' '+myName,type:'react',ts:Date.now()});};
window.sendPauseRequest=()=>{if(!db)return;push(ref(db,'rooms/'+roomId+'/chat'),{uid:myId,name:myName,text:'✋ '+myName+' 要求暫停',type:'pause',ts:Date.now()});};
// ANNOTATION
let annoStrokes=[],annoDrawing=false,annoCurPts=[];
let annoColor='#FF5E1A',annoTool='pen',annoOn=false;
// ★★★ toggleAnno: 任何時候都可呼叫，與 animPlaying 完全無關
window.toggleAnno=()=>{
  annoOn=!annoOn;
  const fab=document.getElementById('anno-fab'),dc=document.getElementById('draw-canvas'),bar=document.getElementById('anno-bar');
  if(annoOn){fab.classList.add('on');fab.title='關閉畫圖（再按一次）';dc.classList.add('draw-on');bar.classList.add('show');}
  else{fab.classList.remove('on');fab.title='開啟畫圖討論';dc.classList.remove('draw-on');bar.classList.remove('show');}
};
window.setAnnoTool=(t,btn)=>{annoTool=t;document.querySelectorAll('.anno-btn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');};
window.clearAnno=()=>{annoStrokes=[];clearDC();if(db)set(ref(db,'rooms/'+roomId+'/anno'),{strokes:[]});};
function pushAnno(){if(!db||!window.__isHost)return;set(ref(db,'rooms/'+roomId+'/anno'),{strokes:annoStrokes,ts:Date.now()});}
function clearDC(){const dc=document.getElementById('draw-canvas');dc.getContext('2d').clearRect(0,0,dc.width,dc.height);}
function redrawAnno(strokes){const dc=document.getElementById('draw-canvas');const ctx=dc.getContext('2d');ctx.clearRect(0,0,dc.width,dc.height);(strokes||[]).forEach(s=>{if(!s.pts||s.pts.length<2)return;ctx.save();ctx.strokeStyle=s.color||'#FF5E1A';ctx.lineWidth=s.width||3;ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor=s.color;ctx.shadowBlur=4;ctx.beginPath();ctx.moveTo(s.pts[0].x,s.pts[0].y);for(let i=1;i<s.pts.length;i++)ctx.lineTo(s.pts[i].x,s.pts[i].y);ctx.stroke();if(s.arrow&&s.pts.length>=2){const n=s.pts.length,ex=s.pts[n-1].x,ey=s.pts[n-1].y,px=s.pts[n-2].x,py=s.pts[n-2].y;const ang=Math.atan2(ey-py,ex-px),h=14;ctx.fillStyle=s.color;ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex-h*Math.cos(ang-.42),ey-h*Math.sin(ang-.42));ctx.lineTo(ex-h*Math.cos(ang+.42),ey-h*Math.sin(ang+.42));ctx.closePath();ctx.fill();}ctx.restore();});}
const DC=document.getElementById('draw-canvas');
function getDCPos(e){const r=DC.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{x:(cx-r.left)*(DC.width/r.width),y:(cy-r.top)*(DC.height/r.height)};}
DC.addEventListener('mousedown',e=>{if(!annoOn)return;annoDrawing=true;const pos=getDCPos(e);annoCurPts=[{x:pos.x,y:pos.y}];});
DC.addEventListener('mousemove',e=>{if(!annoDrawing||!annoOn)return;const pos=getDCPos(e);annoCurPts.push({x:pos.x,y:pos.y});redrawAnno([...annoStrokes,{color:annoColor,width:3,pts:annoCurPts,arrow:annoTool==='arrow'}]);});
DC.addEventListener('mouseup',e=>{if(!annoDrawing||!annoOn)return;annoDrawing=false;if(annoCurPts.length>1){annoStrokes.push({color:annoColor,width:3,pts:[...annoCurPts],arrow:annoTool==='arrow'});pushAnno();}annoCurPts=[];});
DC.addEventListener('touchstart',e=>{e.preventDefault();if(!annoOn)return;annoDrawing=true;const pos=getDCPos(e);annoCurPts=[{x:pos.x,y:pos.y}];},{passive:false});
DC.addEventListener('touchmove',e=>{e.preventDefault();if(!annoDrawing||!annoOn)return;const pos=getDCPos(e);annoCurPts.push({x:pos.x,y:pos.y});redrawAnno([...annoStrokes,{color:annoColor,width:3,pts:annoCurPts,arrow:annoTool==='arrow'}]);},{passive:false});
DC.addEventListener('touchend',e=>{e.preventDefault();if(!annoDrawing||!annoOn)return;annoDrawing=false;if(annoCurPts.length>1){annoStrokes.push({color:annoColor,width:3,pts:[...annoCurPts],arrow:annoTool==='arrow'});pushAnno();}annoCurPts=[];},{passive:false});
// CHAT
window.sendMsg=()=>{const inp=document.getElementById('chat-inp'),t=inp.value.trim();if(!t||!db)return;inp.value='';push(ref(db,'rooms/'+roomId+'/chat'),{uid:myId,name:myName,text:t,type:'text',ts:Date.now()});};
window.sendStk=s=>{if(!db)return;push(ref(db,'rooms/'+roomId+'/chat'),{uid:myId,name:myName,text:s,type:'stk',ts:Date.now()});};
window.toggleLike=(mk,em)=>{if(!db)return;const lr=ref(db,'rooms/'+roomId+'/likes/'+mk+'/'+em+'/'+myId);get(lr).then(s=>{s.exists()?remove(lr):set(lr,true);});};
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('chat-inp')===document.activeElement)window.sendMsg();});
function sysMsg(t){if(!db)return;push(ref(db,'rooms/'+roomId+'/chat'),{uid:'__sys__',text:t,type:'sys',ts:Date.now()});}
const AVC2=['#FF5E1A','#2979FF','#00C853','#FFD600','#AA00FF','#FF1744','#00BCD4'];
function appendMsg(m,key,silent){const box=document.getElementById('chat-msgs');if(!box)return;const el=document.createElement('div');if(m.type==='sys'||m.uid==='__sys__'){el.className='msg-sys';el.textContent=m.text;}else if(m.type==='react'){el.className='msg-react';el.textContent=m.text;}else if(m.type==='pause'){el.className='msg-pause';el.textContent=m.text;}else{const me=m.uid===myId,t=new Date(m.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});const body=m.type==='stk'?'<div class="msg-stk">'+m.text+'</div>':'<div class="msg-body'+(me?' mine':'')+'">'+esc(m.text)+'</div>';const lks=['👍','❤️','😂'].map(e=>'<button class="like-btn" data-mk="'+key+'" data-em="'+e+'" onclick="toggleLike(\''+key+'\',\''+e+'\')">'+e+'</button>').join('');el.className='msg';el.innerHTML='<div class="msg-top"><div class="msg-av" style="background:'+AVC2[m.name?m.name.charCodeAt(0)%AVC2.length:0]+'">'+((m.name||'?')[0])+'</div><span class="msg-who'+(me?' me':'')+'">'+( m.name||'?')+'</span><span class="msg-when">'+t+'</span></div>'+body+'<div class="msg-likes">'+lks+'</div>';}box.appendChild(el);if(!silent)box.scrollTop=box.scrollHeight;}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let pushT=null;
window.__push=()=>{if(remoteUpd||!db)return;clearTimeout(pushT);pushT=setTimeout(()=>set(ref(db,'rooms/'+roomId+'/state'),{frames,by:myName,ts:serverTimestamp()}),80);};
window.saveTactic=()=>{if(!db){alert('單機模式無法儲存');return;}const n=prompt('戰術名稱：','新戰術')||'新戰術';set(ref(db,'rooms/'+roomId+'/tactics/'+Date.now()),{name:n,frames,savedBy:myName});alert('✅「'+n+'」已儲存！');};
window.copyLink=()=>{navigator.clipboard?.writeText(document.getElementById('share-link').value).catch(()=>{});const b=document.querySelector('.m-copy');if(b){b.textContent='✓ 已複製';setTimeout(()=>b.textContent='複製',2000);}};
window.shareLine=()=>window.open('https://line.me/R/msg/text/?'+encodeURIComponent(document.getElementById('share-link').value));
</script>

<script>
// ─────────────────────────────────────────────
//  SVG 架構說明：
//  - 球場底圖為固定 SVG（viewBox 0 0 3000 1700）
//  - 1m = 100 SVG 單位；場地本體 2800×1500，四邊 100px 邊界
//  - canvas 透明疊加在 SVG 上，尺寸同步
//  - 球員/球/戰術線座標使用 SVG 單位（0~3000, 0~1700）
//  - 場地本體起點：(100, 100)
// ─────────────────────────────────────────────

const CV = document.getElementById('court');
const ct = CV.getContext('2d');

// SVG 座標系常數（對應 viewBox 0 0 3000 1700）
const SVG_W = 3000, SVG_H = 1700;   // 含邊界
const COURT_X = 100, COURT_Y = 100; // 場地原點（SVG 單位）
const COURT_W = 2800, COURT_H = 1500;
const U = 100; // 1m = 100 SVG 單位

// Court Spec Fix：以 FIBA 28m × 15m 為基準，三分線/限制區弧必須朝「場內」凸出。
// 本版已修正 SVG Arc sweep / large-arc 旗標，避免三分弧或限制區弧畫到錯誤方向。
function clampToBoard(p) {
  return {
    x: Math.max(0, Math.min(SVG_W, p.x)),
    y: Math.max(0, Math.min(SVG_H, p.y))
  };
}
function clampToCourt(p) {
  return {
    x: Math.max(COURT_X, Math.min(COURT_X + COURT_W, p.x)),
    y: Math.max(COURT_Y, Math.min(COURT_Y + COURT_H, p.y))
  };
}

// SVG 座標 → canvas pixel
function s2c(sx, sy) {

function c2s(cx, cy) {

function initCourtDims() {
  const a = document.getElementById('ca');
  // 維持 3000:1700 比例（含邊界）
  let aw = a.clientWidth - 12, ah = a.clientHeight - 12;
  const ratio = SVG_W / SVG_H; // 3000/1700
  let cw = Math.min(aw, ah * ratio);
  let ch = cw / ratio;
  if (ch > ah) { ch = ah; cw = ch * ratio; }
  CW = Math.floor(cw);
  CH = Math.floor(ch);

  // 設定 court-cw 容器尺寸（SVG 會自動填滿）
  const ccw = document.getElementById('court-cw-el');
  ccw.style.width  = CW + 'px';
  ccw.style.height = CH + 'px';

  // canvas 透明疊加，尺寸與容器一致
  CV.width  = CW; CV.height = CH;
  CV.style.width  = CW + 'px'; CV.style.height = CH + 'px';

  // draw-canvas 同步
  const dc = document.getElementById('draw-canvas');
  dc.width = CW; dc.height = CH;
  dc.style.width = CW + 'px'; dc.style.height = CH + 'px';

  // 比例：SVG 單位 → canvas pixel
  SC_X = CW / SVG_W;
  SC_Y = CH / SVG_H;
}

function clampGroupDelta(items,dx,dy){
  if(!items||!items.length)return{dx,dy};
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  items.forEach(it=>{minX=Math.min(minX,it.x);maxX=Math.max(maxX,it.x);minY=Math.min(minY,it.y);maxY=Math.max(maxY,it.y);});

  return{dx,dy};
}

function interpolateFrame(t){
  const count=frames.length;
  const p=Math.max(0,Math.min(1,t))*(count-1);
  const fi=Math.min(Math.floor(p),count-2);
  const frac=p-fi;
  const f0=frames[fi],f1=frames[fi+1];
  if(!f0||!f1)return CF();
  const maxP=Math.max((f0.players||[]).length,(f1.players||[]).length);
  const intP=[];
  for(let i=0;i<maxP;i++){
    const p0=(f0.players||[])[i],p1=(f1.players||[])[i];
    if(p0&&p1)intP.push({...p0,x:lerp(p0.x,p1.x,frac),y:lerp(p0.y,p1.y,frac)});
    else if(p0)intP.push({...p0});
    else if(p1)intP.push({...p1});
  }
  const intBall=f0.ball&&f1.ball?{...f0.ball,x:lerp(f0.ball.x,f1.ball.x,frac),y:lerp(f0.ball.y,f1.ball.y,frac)}:(f0.ball||f1.ball||null);
  return {...f0,players:intP,ball:intBall};
}

  ctx.beginPath();ctx.arc((COURT_X+COURT_W/2)*mU,(COURT_Y+COURT_H/2)*mU,180*mU,0,Math.PI*2);ctx.stroke();
  // 籃框（SVG 座標：左 257.5, 右 2742.5, y=850）
  ctx.fillStyle='#FF5E1A';
  ctx.beginPath();ctx.arc(257.5*mU,850*mU,22.5*mU,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(2742.5*mU,850*mU,22.5*mU,0,Math.PI*2);ctx.fill();
  // 箭頭（球員座標已是 SVG 單位）
  (f.arrows||[]).forEach(a=>{if(!a.pts||a.pts.length<2)return;const pm=tm(a.pts[0].x,a.pts[0].y);ctx.strokeStyle=a.color||'#fff';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(pm.mx,pm.my);for(let i=1;i<a.pts.length;i++){const q=tm(a.pts[i].x,a.pts[i].y);ctx.lineTo(q.mx,q.my);}ctx.stroke();});
  // 球員
  (f.players||[]).forEach(p=>{const pm=tm(p.x,p.y),r=Math.max(4,pSize*.45*msx/SC_X);ctx.beginPath();ctx.arc(pm.mx,pm.my,r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.font='bold '+Math.max(5,r*.85)+'px Barlow Condensed,sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.name?p.name[0]:p.num,pm.mx,pm.my);});
  // 球
  if(f.ball){const bm=tm(f.ball.x,f.ball.y),r=Math.max(3,pSize*.38*msx/SC_X);ctx.beginPath();ctx.arc(bm.mx,bm.my,r,0,Math.PI*2);ctx.fillStyle='#FF5E1A';ctx.fill();}
}

// ★★★ INPUT - hDown 核心修正
// 畫圖模式開啟時 draw-canvas 的 pointer-events:all 優先接收，court 收不到事件
// 因此只需要移除 animPlaying 對「放置球員/球」的阻擋
function getPos(e){const r=CV.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;const canvasX=(cx-r.left)*(CV.width/r.width),canvasY=(cy-r.top)*(CV.height/r.height);return c2s(canvasX,canvasY);}
function hitTest(pos){const r=PR(),ctrlR=px2s(9),hitR=px2s(12);const f=CF();if(sel&&sel.type==='arr'){const a=f.arrows[sel.arrI];if(a)for(let i=1;i<a.pts.length-1;i++)if(Math.hypot(pos.x-a.pts[i].x,pos.y-a.pts[i].y)<ctrlR)return{type:'ctrl',arrI:sel.arrI,ptI:i};}for(let i=f.players.length-1;i>=0;i--)if(Math.hypot(pos.x-f.players[i].x,pos.y-f.players[i].y)<r+px2s(7))return{type:'ply',i};if(f.ball&&Math.hypot(pos.x-f.ball.x,pos.y-f.ball.y)<px2s(Math.max(10,pSize*.58)+7))return{type:'bal'};for(let i=(f.screens||[]).length-1;i>=0;i--){const s=f.screens[i];if(Math.abs(pos.x-s.x)<r&&Math.abs(pos.y-s.y)<r)return{type:'scr',i};}for(let i=(f.arrows||[]).length-1;i>=0;i--){const a=f.arrows[i];if(!a.pts||a.pts.length<2)continue;for(let j=0;j<a.pts.length-1;j++){const px=a.pts[j].x,py=a.pts[j].y,qx=a.pts[j+1].x,qy=a.pts[j+1].y,dx=qx-px,dy=qy-py,len=dx*dx+dy*dy||1,t=Math.max(0,Math.min(1,((pos.x-px)*dx+(pos.y-py)*dy)/len));if(Math.hypot(pos.x-(px+t*dx),pos.y-(py+t*dy))<hitR)return{type:'arr',arrI:i};}}return null;}
function showNP(p){pendingP=p;const np=document.getElementById('npw'),ni=document.getElementById('np-n'),nn=document.getElementById('np-num');const r=CV.getBoundingClientRect(),area=document.getElementById('ca'),ar=area.getBoundingClientRect();const cp=s2c(p.x,p.y);let left=cp.x*(r.width/CV.width)+r.left-ar.left+15,top=cp.y*(r.height/CV.height)+r.top-ar.top+15;if(left+190>ar.width)left-=205;if(top+130>ar.height)top-=140;np.style.left=left+'px';np.style.top=top+'px';np.style.display='block';ni.value=p.name||'';nn.value=p.jersey||'';setTimeout(()=>ni.focus(),80);}
function confirmNP(){const v=document.getElementById('np-n').value.trim(),n=document.getElementById('np-num').value.trim();if(pendingP){pendingP.name=v||'';if(n)pendingP.jersey=parseInt(n);}document.getElementById('npw').style.display='none';pendingP=null;render();if(window.__push)window.__push();}

let lpTimer=null;
function hDown(e){
  // ★ 關鍵修正：不再用 animPlaying 封鎖所有操作
  // 畫路線工具才限制（避免播放中亂畫）
  let pos=getPos(e);
  pos=clampToCourt(pos);
  document.getElementById('npw').style.display='none';
  if(tool==='player'){
    snap();
    const p={x:pos.x,y:pos.y,color:col,num:pctr++,name:'',jersey:null};
    CF().players.push(p);sel={type:'ply',i:CF().players.length-1};
    render();showNP(p);if(window.__push)window.__push();return;
  }
  if(tool==='ball'){snap();CF().ball={x:pos.x,y:pos.y};sel={type:'bal'};render();if(window.__push)window.__push();return;}
  if(tool==='screen'){snap();if(!CF().screens)CF().screens=[];CF().screens.push({x:pos.x,y:pos.y,color:col});sel={type:'scr',i:CF().screens.length-1};render();if(window.__push)window.__push();return;}
  if(tool==='cut'||tool==='pass'||tool==='drib'){
    if(animPlaying)return;// 畫路線時才不允許（避免混亂）
    drawing=true;drawPts=[{x:pos.x,y:pos.y}];return;
  }
  if(tool==='box'){boxSelecting=true;boxStart=pos;boxEnd=pos;selectedPlayers=[];sel=null;clearDragState();render();return;}
  if(tool==='select'){
    const h=hitTest(pos);
    // v5：選取工具同時支援框選。點空白處拖曳即開始框選，不必切換工具。
    if(!h){sel=null;selectedPlayers=[];boxSelecting=true;boxStart=pos;boxEnd=pos;clearDragState();render();return;}
    sel=h;drag=h;dragStartPos=pos;
    if(h.type==='ply'){
      if(selectedPlayers.includes(h.i)){
        drag={type:'group'};
        dragSnapshot=selectedPlayers.map(i=>{const p=CF().players[i];return p?{i,x:p.x,y:p.y}:null;}).filter(Boolean);
      }else{
        selectedPlayers=[];
        dragSnapshot={type:'ply',i:h.i,x:CF().players[h.i].x,y:CF().players[h.i].y};
      }
      lpTimer=setTimeout(()=>{if(drag&&drag.type!=='group')showNP(CF().players[h.i]);lpTimer=null;},500);
    }else if(h.type==='bal'&&CF().ball){
      selectedPlayers=[];dragSnapshot={type:'bal',x:CF().ball.x,y:CF().ball.y};
    }else if(h.type==='scr'){
      selectedPlayers=[];const sc=CF().screens[h.i];dragSnapshot={type:'scr',i:h.i,x:sc.x,y:sc.y};
    }else if(h.type==='arr'){
      selectedPlayers=[];dragSnapshot={type:'arr',arrI:h.arrI,pts:CF().arrows[h.arrI].pts.map(p=>({x:p.x,y:p.y}))};
    }else if(h.type==='ctrl'){
      selectedPlayers=[];const pt=CF().arrows[h.arrI].pts[h.ptI];dragSnapshot={type:'ctrl',arrI:h.arrI,ptI:h.ptI,x:pt.x,y:pt.y};
    }
    dox=pos.x;doy=pos.y;
    render();
  }
}
function hMove(e){
  if(animPlaying&&tool!=='select')return;
  let pos=getPos(e);pos=clampToBoard(pos);if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
  if((tool==='box'||tool==='select')&&boxSelecting){boxEnd=pos;render();return;}
  if((tool==='cut'||tool==='pass'||tool==='drib')&&drawing){drawPts.push({x:pos.x,y:pos.y});render();return;}
  if(tool==='select'&&drag&&dragStartPos){
    let dx=pos.x-dragStartPos.x,dy=pos.y-dragStartPos.y;
    if(drag.type==='group'&&Array.isArray(dragSnapshot)){
      const lim=clampGroupDelta(dragSnapshot,dx,dy);dx=lim.dx;dy=lim.dy;
      dragSnapshot.forEach(it=>{const p=CF().players[it.i];if(p){p.x=it.x+dx;p.y=it.y+dy;}});
    }else if(drag.type==='ply'&&dragSnapshot){
      const p=CF().players[drag.i],np=clampToCourt({x:dragSnapshot.x+dx,y:dragSnapshot.y+dy});if(p)Object.assign(p,np);
    }else if(drag.type==='bal'&&dragSnapshot&&CF().ball){
      Object.assign(CF().ball,clampToCourt({x:dragSnapshot.x+dx,y:dragSnapshot.y+dy}));
    }else if(drag.type==='scr'&&dragSnapshot){
      const sc=CF().screens[drag.i],np=clampToCourt({x:dragSnapshot.x+dx,y:dragSnapshot.y+dy});if(sc)Object.assign(sc,np);
    }else if(drag.type==='arr'&&dragSnapshot){
      CF().arrows[drag.arrI].pts.forEach((p,i)=>{const o=dragSnapshot.pts[i];if(o){p.x=o.x+dx;p.y=o.y+dy;}});
    }else if(drag.type==='ctrl'&&dragSnapshot){
      const pt=CF().arrows[drag.arrI].pts[drag.ptI];pt.x=dragSnapshot.x+dx;pt.y=dragSnapshot.y+dy;
    }
    render();if(window.__push)window.__push();
  }
}
function hUp(e){
  if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
  if((tool==='box'||tool==='select')&&boxSelecting){
    boxSelecting=false;
    const x1=Math.min(boxStart.x,boxEnd.x),x2=Math.max(boxStart.x,boxEnd.x),y1=Math.min(boxStart.y,boxEnd.y),y2=Math.max(boxStart.y,boxEnd.y);
    selectedPlayers=[];(CF().players||[]).forEach((p,i)=>{if(p.x>=x1&&p.x<=x2&&p.y>=y1&&p.y<=y2)selectedPlayers.push(i);});
    sel=null;boxStart=null;boxEnd=null;render();return;
  }
  if((tool==='cut'||tool==='pass'||tool==='drib')&&drawing){if(drawPts.length>1&&Math.hypot(drawPts[drawPts.length-1].x-drawPts[0].x,drawPts[drawPts.length-1].y-drawPts[0].y)>px2s(14)){snap();const pts=simplify(drawPts,px2s(3));if(!CF().arrows)CF().arrows=[];CF().arrows.push({pts,style:tool,color:col});sel={type:'arr',arrI:CF().arrows.length-1};if(window.__push)window.__push();}drawing=false;drawPts=[];render();renderFrameList();return;}
  clearDragState();
}
function hDbl(e){if(animPlaying)return;const pos=getPos(e),h=hitTest(pos);if(h&&h.type==='ply')showNP(CF().players[h.i]);if(h&&h.type==='arr'){const a=CF().arrows[h.arrI];let minD=Infinity,bestJ=0;for(let j=0;j<a.pts.length-1;j++){const px=a.pts[j].x,py=a.pts[j].y,qx=a.pts[j+1].x,qy=a.pts[j+1].y,t=Math.max(0,Math.min(1,((pos.x-px)*(qx-px)+(pos.y-py)*(qy-py))/((qx-px)**2+(qy-py)**2||1)));const d=Math.hypot(pos.x-(px+t*(qx-px)),pos.y-(py+t*(qy-py)));if(d<minD){minD=d;bestJ=j;}}a.pts.splice(bestJ+1,0,{x:pos.x,y:pos.y});sel={type:'arr',arrI:h.arrI};render();if(window.__push)window.__push();}}
// v5：改用 Pointer Events，並啟用 pointer capture。
// 好處：滑鼠移動太快離開 canvas 時，仍能收到 move/up，不會造成框選或拖曳漂移。

CV.addEventListener('pointerup',e=>{e.preventDefault();try{CV.releasePointerCapture?.(e.pointerId);}catch(_e){}hUp(e);},{passive:false});
CV.addEventListener('pointercancel',e=>{try{CV.releasePointerCapture?.(e.pointerId);}catch(_e){}boxSelecting=false;drawing=false;clearDragState();render();},{passive:false});

function makeFrame(name, arr, ballIndex=null, color='#FF5E1A', arrows=[], screens=[]){
  const px=(fx,fy)=>({x:COURT_X+COURT_W*fx,y:COURT_Y+COURT_H*fy});
  const names=['PG','SG','SF','PF','C'];
  return {name,players:arr.map((a,i)=>({...px(a[0],a[1]),color,num:i+1,name:names[i],jersey:i+1})),ball:ballIndex==null?null:{...px(arr[ballIndex][0],arr[ballIndex][1])},arrows:arrows.map(ar=>({pts:ar.pts.map(p=>px(p[0],p[1])),style:ar.style||'cut',color:ar.color||'#FFD600'})),screens:screens.map(p=>({...px(p[0],p[1]),color}))};
}

async function exportImg(){
  // 匯出時要合成 SVG 球場 + Canvas 球員戰術 + 標註層；舊版只匯出 canvas，會缺少球場底圖。
  try{
    const svgEl=document.getElementById('court-svg');
    const svgText=new XMLSerializer().serializeToString(svgEl);
    const svgBlob=new Blob([svgText],{type:'image/svg+xml;charset=utf-8'});
    const url=URL.createObjectURL(svgBlob);
    const img=new Image();
    img.onload=()=>{
      const out=document.createElement('canvas');out.width=CW;out.height=CH;
      const ctx=out.getContext('2d');
      ctx.drawImage(img,0,0,CW,CH);
      ctx.drawImage(CV,0,0,CW,CH);
      const dc=document.getElementById('draw-canvas');
      ctx.drawImage(dc,0,0,CW,CH);
      URL.revokeObjectURL(url);
      const a=document.createElement('a');a.download='hoopboard.png';a.href=out.toDataURL('image/png');a.click();
    };
    img.onerror=()=>{URL.revokeObjectURL(url);throw new Error('SVG 匯出失敗');};
    img.src=url;
  }catch(e){
    console.error(e);
    const a=document.createElement('a');a.download='hoopboard-canvas-only.png';a.href=CV.toDataURL('image/png');a.click();
  }
}
window.exportImg=exportImg;
