<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>HoopBoard Ultra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0B1622;--bg2:#13202F;--or:#F4732A;--or2:#FF9550;
  --w:#FFF;--w2:rgba(255,255,255,.8);--gr:#7A8899;
  --ln:rgba(255,255,255,.06);--ln2:rgba(255,255,255,.1);
  --gn:#3DD68C;--red:#F05252;--yellow:#FBBF24;
  --safe-b:env(safe-area-inset-bottom,0px);
  --tb-h:62px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:var(--w);touch-action:none;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--bg2);border-bottom:1px solid var(--ln);flex-shrink:0;height:48px;gap:8px;z-index:20;position:relative;}
.logo{display:flex;align-items:center;gap:6px;}
.logo-ball{width:26px;height:26px;background:linear-gradient(135deg,var(--or),var(--or2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 10px rgba(244,115,42,.5);}
.logo-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;}
.logo-name span{color:var(--or);}
.logo-ver{font-size:8px;font-weight:700;background:linear-gradient(90deg,var(--or),var(--or2));color:#fff;padding:1px 5px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;}
.room-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;background:rgba(255,255,255,.04);border:1px solid var(--ln2);border-radius:7px;cursor:pointer;}
.room-code{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--or);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.h-btns{display:flex;gap:4px;}
.h-btn{width:34px;height:34px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:var(--w2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.h-btn:active{background:rgba(255,255,255,.16);}
.h-btn.or{background:var(--or);}

/* ── COURT ── */
.court-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;position:relative;overflow:hidden;background:var(--bg);}
.court-cw{border-radius:10px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05);}
canvas{display:block;touch-action:none;}
.sync-pill{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(11,22,34,.9);border:1px solid rgba(61,214,140,.25);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--gn);display:flex;align-items:center;gap:4px;white-space:nowrap;pointer-events:none;}
.sync-pill.off{color:var(--red);border-color:rgba(240,82,82,.25);}
.anim-pill{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);background:rgba(11,22,34,.94);border:1px solid var(--ln2);border-radius:10px;padding:5px 12px;display:none;align-items:center;gap:7px;white-space:nowrap;z-index:10;}
.anim-pill.show{display:flex;}
.ap-play{padding:4px 11px;border-radius:6px;border:none;background:var(--or);color:#fff;font-size:10px;font-weight:700;cursor:pointer;}
.ap-stop{padding:4px 11px;border-radius:6px;border:none;background:rgba(255,255,255,.08);color:var(--w2);font-size:10px;cursor:pointer;}
.ap-prog{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--or);min-width:28px;}
.seq-pill{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:9px;padding:5px 12px;display:none;align-items:center;gap:8px;white-space:nowrap;z-index:10;}
.seq-pill.show{display:flex;}
.seq-info{font-size:11px;color:var(--yellow);}
.sq-btn{padding:4px 10px;border-radius:5px;border:none;font-size:10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
/* Name prompt */
.npw{display:none;position:absolute;z-index:60;background:var(--bg2);border:1px solid var(--ln2);border-radius:10px;padding:11px;min-width:175px;box-shadow:0 8px 28px rgba(0,0,0,.6);}
.npw label{font-size:10px;color:var(--gr);display:block;margin-bottom:4px;}
.npw-row{display:flex;gap:5px;margin-bottom:6px;}
.npw-inp{flex:1;padding:7px 8px;background:rgba(255,255,255,.08);border:1px solid var(--ln2);border-radius:6px;color:var(--w);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;}
.npw-inp:focus{border-color:var(--or);}
.npw-num{width:48px;text-align:center;}
.npw-btns{display:flex;gap:5px;}
.npw-btns button{flex:1;padding:8px;border-radius:7px;border:none;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.np-ok{background:var(--or);color:#fff;font-weight:700;}
.np-skip{background:rgba(255,255,255,.08);color:var(--w2);border:1px solid var(--ln2);}

/* ── BOTTOM TOOLBAR ── */
.bottom-tb{
  flex-shrink:0;background:var(--bg2);border-top:1px solid var(--ln);
  display:flex;align-items:center;padding:0 4px;
  padding-bottom:var(--safe-b);
  min-height:calc(var(--tb-h) + var(--safe-b));
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;gap:1px;
}
.bottom-tb::-webkit-scrollbar{display:none;}
.t-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:50px;height:54px;border-radius:9px;border:none;
  background:transparent;color:var(--gr);cursor:pointer;
  gap:3px;transition:all .12s;flex-shrink:0;
}
.t-btn svg{width:18px;height:18px;}
.t-btn span{font-size:8.5px;font-weight:600;white-space:nowrap;}
.t-btn:active{background:rgba(255,255,255,.08);color:var(--w2);}
.t-btn.act{background:rgba(244,115,42,.2);color:var(--or);}
.tb-sep{width:1px;height:36px;background:var(--ln);flex-shrink:0;margin:0 2px;}
.t-color{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;margin:0 2px;transition:all .15s;}
.t-color.act{border-color:#fff;transform:scale(1.12);}
.t-size{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:46px;flex-shrink:0;}
.t-size input{width:42px;-webkit-appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.12);outline:none;cursor:pointer;}
.t-size input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--or);cursor:pointer;}
.t-size span{font-size:8px;color:var(--gr);}

/* ── BOTTOM SHEET ── */
.sheet-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;}
.sheet-ov.show{display:block;}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--bg2);border-radius:16px 16px 0 0;border-top:1px solid var(--ln2);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;max-height:78dvh;padding-bottom:var(--safe-b);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 6px;flex-shrink:0;cursor:pointer;}
.sheet-tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--ln);flex-shrink:0;}
.s-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;color:var(--gr);border-bottom:2px solid transparent;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.s-tab.act{color:var(--or);border-bottom-color:var(--or);}
.sheet-body{flex:1;overflow-y:auto;padding-bottom:6px;}
.sheet-body::-webkit-scrollbar{display:none;}
/* Open button */
.sheet-fab{position:fixed;bottom:calc(var(--tb-h) + var(--safe-b) + 8px);right:10px;width:42px;height:42px;border-radius:50%;background:var(--or);border:none;color:#fff;font-size:17px;cursor:pointer;box-shadow:0 4px 14px rgba(244,115,42,.5);z-index:50;display:flex;align-items:center;justify-content:center;}

/* ── SHEET CONTENT ── */
.psec{padding:9px 12px;border-bottom:1px solid var(--ln);}
.psec-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gr);margin-bottom:7px;}
.online-list{display:flex;flex-direction:column;gap:4px;}
.o-row{display:flex;align-items:center;gap:6px;font-size:11px;}
.o-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;}
.o-dot{width:5px;height:5px;border-radius:50%;background:var(--gn);margin-left:auto;}
.pl{display:flex;flex-direction:column;gap:3px;}
.pi{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .15s;}
.pi:active{background:rgba(255,255,255,.1);}
.pi.sel{border-color:var(--or);background:rgba(244,115,42,.1);}
.pd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;}
.pi-nw{flex:1;overflow:hidden;}
.pi-n{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pi-ni{display:none;width:100%;background:transparent;border:none;border-bottom:1px solid var(--or);color:var(--w);font-size:12px;font-family:'Noto Sans TC',sans-serif;outline:none;padding:0;}
.pi-del{width:28px;height:28px;border:none;background:transparent;color:var(--gr);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;}
.pi-del:active{background:rgba(240,82,82,.15);color:var(--red);}
.seq-badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;background:rgba(251,191,36,.18);color:var(--yellow);border-radius:4px;padding:1px 4px;flex-shrink:0;}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.tc{padding:8px 5px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .15s;text-align:center;}
.tc:active{background:rgba(244,115,42,.15);border-color:rgba(244,115,42,.3);}
.tc.anim{border-color:rgba(61,214,140,.15);}
.tc.anim:active{background:rgba(61,214,140,.12);}
.tc.seq{border-color:rgba(251,191,36,.12);}
.tc.seq:active{background:rgba(251,191,36,.1);}
.tc-em{font-size:16px;display:block;margin-bottom:2px;}
.tc-name{font-size:9px;color:var(--gr);line-height:1.3;}
.tc-badge{font-size:8px;font-weight:700;}
.tc-badge.g{color:var(--gn);}
.tc-badge.y{color:var(--yellow);}
.sym-list{display:flex;flex-direction:column;gap:4px;}
.sym-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:rgba(255,255,255,.03);}
.sym-nm{font-size:10px;font-weight:700;color:var(--w2);}
.sym-dc{font-size:9px;color:var(--gr);margin-top:1px;}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:300px;}
.chat-msgs{flex:1;overflow-y:auto;padding:7px 10px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;}
.msg{display:flex;flex-direction:column;gap:1px;}
.msg-top{display:flex;align-items:center;gap:3px;}
.msg-av{width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0;}
.msg-who{font-size:9px;font-weight:700;color:var(--or);}
.msg-who.me{color:var(--gn);}
.msg-when{font-size:8px;color:var(--gr);}
.msg-body{font-size:11px;padding:4px 7px;background:rgba(255,255,255,.05);border-radius:0 6px 6px 6px;margin-left:16px;line-height:1.5;word-break:break-all;}
.msg-body.mine{background:rgba(244,115,42,.12);border-radius:6px 0 6px 6px;}
.msg-stk{font-size:24px;margin-left:16px;}
.msg-sys{font-size:9px;color:var(--gr);text-align:center;font-style:italic;}
.msg-likes{margin-left:16px;display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;}
.like-btn{font-size:10px;padding:2px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);cursor:pointer;color:var(--gr);}
.like-btn:active{background:rgba(244,115,42,.15);border-color:var(--or);color:var(--or);}
.like-btn.liked{background:rgba(244,115,42,.15);border-color:var(--or);color:var(--or);}
.chat-ia{flex-shrink:0;border-top:1px solid var(--ln);}
.stk-strip{display:flex;gap:3px;padding:4px 9px;overflow-x:auto;flex-shrink:0;}
.stk-strip::-webkit-scrollbar{display:none;}
.stk-btn{font-size:20px;cursor:pointer;padding:2px;border:none;background:transparent;flex-shrink:0;border-radius:5px;}
.stk-btn:active{background:rgba(255,255,255,.1);}
.chat-row{display:flex;gap:5px;padding:5px 9px;}
.chat-inp{flex:1;padding:8px 10px;background:rgba(255,255,255,.06);border:1px solid var(--ln2);border-radius:8px;color:var(--w);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;}
.chat-inp:focus{border-color:var(--or);}
.chat-send{padding:8px 14px;background:var(--or);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}

/* ── SETUP ── */
.setup-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;}
.setup-box{background:var(--bg2);border:1px solid var(--ln2);border-radius:14px;padding:24px;width:100%;max-width:380px;}
.setup-box h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;margin-bottom:4px;}
.setup-box p{font-size:11px;color:var(--gr);margin-bottom:14px;line-height:1.8;}
.s-inp{width:100%;padding:11px 12px;background:rgba(255,255,255,.07);border:1px solid var(--ln2);border-radius:8px;color:var(--w);font-size:15px;margin-bottom:8px;font-family:'Noto Sans TC',sans-serif;}
.s-inp:focus{outline:none;border-color:var(--or);}
.s-row{display:flex;gap:7px;margin-bottom:8px;}
.s-btn{flex:1;padding:12px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.sor{background:var(--or);color:#fff;}
.sgh{background:rgba(255,255,255,.08);color:var(--w2);border:1px solid var(--ln2);}
.s-note{font-size:10px;color:var(--gr);line-height:1.8;background:rgba(255,255,255,.04);border-radius:8px;padding:9px;}
/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;justify-content:center;}
.modal-ov.show{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--ln2);border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:420px;padding-bottom:calc(20px + var(--safe-b));}
.modal-box h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;margin-bottom:3px;}
.modal-box p{font-size:11px;color:var(--gr);margin-bottom:11px;}
.ml-row{display:flex;gap:5px;margin-bottom:9px;}
.ml-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--ln2);border-radius:7px;padding:8px;color:var(--w);font-size:11px;font-family:monospace;}
.ml-copy{padding:8px 12px;background:var(--or);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;}
.ms-row{display:flex;gap:5px;margin-bottom:10px;}
.ms-opt{flex:1;padding:9px 5px;border-radius:8px;border:1px solid var(--ln2);background:rgba(255,255,255,.04);color:var(--w2);font-size:11px;cursor:pointer;text-align:center;}
.ms-opt:active{background:rgba(244,115,42,.12);border-color:var(--or);}
.ms-opt span{display:block;font-size:17px;margin-bottom:3px;}
.m-close{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid var(--ln2);border-radius:8px;color:var(--w2);font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup-ov" id="su-ov">
  <div class="setup-box">
    <h2>🏀 HoopBoard <span style="font-size:11px;background:linear-gradient(90deg,#F4732A,#FF9550);color:#fff;padding:1px 7px;border-radius:7px;font-family:'Barlow Condensed',sans-serif">ULTRA</span></h2>
    <p>選擇你的身份開始使用：<br>
    • <b style="color:#fff">建立新房間</b> — 產生連結分享給隊友<br>
    • <b style="color:#fff">加入房間</b> — 輸入教練的房間代碼</p>
    <input class="s-inp" id="su-n" placeholder="你的名稱（例：教練、彥）" maxlength="10" autocomplete="off"/>
    <div class="s-row">
      <button class="s-btn sor" onclick="createRoom()">🆕 建立房間</button>
      <button class="s-btn sgh" onclick="showJoin()">🔗 加入</button>
    </div>
    <div id="join-area" style="display:none;margin-bottom:8px">
      <input class="s-inp" id="su-c" placeholder="房間代碼（例：ATK-7X2）" maxlength="10" style="text-transform:uppercase;margin-bottom:7px" autocomplete="off"/>
      <button class="s-btn sor" onclick="joinRoom()" style="width:100%">✅ 加入房間</button>
    </div>
    <div class="s-note">🔒 Firebase 即時同步，請勿輸入個人敏感資料。<br><span id="fb-st" style="color:#F4732A">⏳ 連線中...</span></div>
  </div>
</div>

<div id="app" style="display:none">
<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-ball">🏀</div>
    <div class="logo-name">HOOP<span>BOARD</span></div>
    <span class="logo-ver">ULTRA</span>
  </div>
  <div class="room-pill" onclick="document.getElementById('share-modal').classList.add('show')">
    <div class="live-dot"></div>
    <span class="room-code" id="rc">------</span>
    <span id="on-n" style="font-size:10px;color:#7A8899">0人</span>
  </div>
  <div class="h-btns">
    <button class="h-btn" onclick="undoAct()">↩</button>
    <button class="h-btn" onclick="exportImg()">📸</button>
    <button class="h-btn or" onclick="saveTactic()">💾</button>
  </div>
</header>

<!-- COURT -->
<div class="court-wrap" id="ca">
  <div class="court-cw" id="cw"><canvas id="court"></canvas></div>
  <div class="sync-pill" id="sync-pill"><div class="live-dot"></div><span id="sync-txt">連線中...</span></div>
  <div class="anim-pill" id="anim-pill">
    <span style="font-size:10px;color:#7A8899" id="anim-lbl">動畫</span>
    <span class="ap-prog" id="anim-prog">0%</span>
    <button class="ap-play" id="anim-pb" onclick="toggleAnim()">▶</button>
    <button class="ap-stop" onclick="stopAnim()">✕</button>
  </div>
  <div class="seq-pill" id="seq-pill">
    <span class="seq-info" id="seq-info">👆 點球員 → 點目標</span>
    <button class="sq-btn" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)" onclick="clearSeq()">清除</button>
    <button class="sq-btn" style="background:#F4732A;color:#fff;font-weight:700" onclick="playSeq()">▶播放</button>
  </div>
  <div class="npw" id="npw">
    <label>球員資訊</label>
    <div class="npw-row">
      <input class="npw-inp" id="np-n" placeholder="名稱" maxlength="6" autocomplete="off"/>
      <input class="npw-inp npw-num" id="np-num" placeholder="#" type="number" min="1" max="99"/>
    </div>
    <div class="npw-btns">
      <button class="np-skip" onclick="cancelNP()">略過</button>
      <button class="np-ok" onclick="confirmNP()">確定</button>
    </div>
  </div>
</div>

<!-- BOTTOM TOOLBAR -->

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const FC={apiKey:"AIzaSyAd5oCNcMUiY3G1tV8djs03Ig83DeRKrqk",authDomain:"basketball-tactics.firebaseapp.com",databaseURL:"https://basketball-tactics-default-rtdb.firebaseio.com",projectId:"basketball-tactics",storageBucket:"basketball-tactics.firebasestorage.app",messagingSenderId:"342499390591",appId:"1:342499390591:web:055c4443ca8400283efb4a"};
const AVC=['#F4732A','#378ADD','#4ADE80','#FACC15','#A78BFA','#F05252','#06B6D4'];

try{const app=initializeApp(FC);db=getDatabase(app);document.getElementById('fb-st').textContent='✅ Firebase 連線成功！';document.getElementById('fb-st').style.color='#3DD68C';}
catch(e){document.getElementById('fb-st').textContent='❌ '+e.message;document.getElementById('fb-st').style.color='#F05252';}
function genId(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<3;i++)s+=c[~~(Math.random()*c.length)];s+='-';for(let i=0;i<3;i++)s+=c[~~(Math.random()*c.length)];return s;}
window.createRoom=()=>{const n=document.getElementById('su-n').value.trim();if(!n){alert('請輸入名稱！');return;}roomId=genId();myName=n;myId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);go();};
window.showJoin=()=>document.getElementById('join-area').style.display='block';
window.joinRoom=()=>{const n=document.getElementById('su-n').value.trim(),c=document.getElementById('su-c').value.trim().toUpperCase();if(!n||!c){alert('請輸入名稱和代碼！');return;}roomId=c;myName=n;myId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);go();};
const urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom){document.getElementById('su-c').value=urlRoom;document.getElementById('join-area').style.display='block';}
function go(){
  document.getElementById('su-ov').style.display='none';

  initCourtDims();buildColors();buildStickerStrip();render();
  if(!db){document.getElementById('sync-txt').textContent='⚠️ 單機模式';document.getElementById('sync-pill').classList.add('off');return;}
  const myColor=AVC[~~(Math.random()*AVC.length)];
  const presRef=ref(db,`rooms/${roomId}/presence/${myId}`);
  set(presRef,{name:myName,color:myColor,online:true,ts:serverTimestamp()});
  onDisconnect(presRef).remove();
  onValue(ref(db,`rooms/${roomId}/presence`),snap=>{
    const users=Object.values(snap.val()||{});
    document.getElementById('on-n').textContent=users.length+'人';
    window.__users=users;
    const el=document.getElementById('online-list-el');if(!el)return;
    el.innerHTML='';users.forEach((u,i)=>{const r=document.createElement('div');r.className='o-row';const me=u.name===myName?' <span style="color:#F4732A;font-size:8px">（你）</span>':'';r.innerHTML=`<div class="o-av" style="background:${u.color||AVC[i%AVC.length]}">${u.name[0]}</div><span>${u.name}${me}</span><div class="o-dot"></div>`;el.appendChild(r);});
  });
  onValue(ref(db,`rooms/${roomId}/state`),snap=>{
    const d=snap.val();if(!d)return;remoteUpdate=true;players=Array.isArray(d.players)?d.players:[];arrows=Array.isArray(d.arrows)?d.arrows:[];screens=Array.isArray(d.screens)?d.screens:[];ball=d.ball||null;remoteUpdate=false;render();
  });
  let fl=true;
  onChildAdded(query(ref(db,`rooms/${roomId}/chat`),limitToLast(60)),snap=>{
    const m=snap.val();if(!m)return;appendMsg(m,snap.key,fl);

    if(m.uid!==myId){unreadN++;const b=document.getElementById('chat-badge');if(b){b.textContent=unreadN;b.style.display='inline';}}
  });
  setTimeout(()=>fl=false,1500);
  onValue(ref(db,`rooms/${roomId}/likes`),snap=>{
    const data=snap.val()||{};document.querySelectorAll('.like-btn').forEach(btn=>{const mk=btn.dataset.mk,em=btn.dataset.em;if(!mk||!em)return;const cnt=data[mk]?data[mk][em]?Object.keys(data[mk][em]).length:0:0;btn.textContent=`${em}${cnt>0?' '+cnt:''}`;btn.classList.toggle('liked',!!(data[mk]&&data[mk][em]&&data[mk][em][myId]));});
  });
  document.getElementById('sync-txt').textContent='即時同步中';
  sysMsg(`${myName} 加入了房間 🏀`);
}
window.sendMsg=()=>{const inp=document.getElementById('chat-inp-el');if(!inp)return;const t=inp.value.trim();if(!t||!db)return;inp.value='';push(ref(db,`rooms/${roomId}/chat`),{uid:myId,name:myName,text:t,type:'text',ts:Date.now()});};
window.sendStk=s=>{if(!db)return;push(ref(db,`rooms/${roomId}/chat`),{uid:myId,name:myName,text:s,type:'stk',ts:Date.now()});};
window.toggleLike=(mk,em)=>{if(!db)return;import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js').then(({get,remove})=>{const lr=ref(db,`rooms/${roomId}/likes/${mk}/${em}/${myId}`);get(lr).then(s=>{s.exists()?remove(lr):set(lr,true);});});};
function sysMsg(t){if(!db)return;push(ref(db,`rooms/${roomId}/chat`),{uid:'__sys__',text:t,type:'sys',ts:Date.now()});}
const AVC2=['#F4732A','#378ADD','#4ADE80','#FACC15','#A78BFA','#F05252','#06B6D4'];
function appendMsg(m,key,silent){
  const box=document.getElementById('chat-msgs-el');if(!box)return;
  const el=document.createElement('div');
  if(m.type==='sys'||m.uid==='__sys__'){el.className='msg-sys';el.textContent=m.text;}
  else{const me=m.uid===myId,t=new Date(m.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});const body=m.type==='stk'?`<div class="msg-stk">${m.text}</div>`:`<div class="msg-body${me?' mine':''}">${esc(m.text)}</div>`;const lks=['👍','❤️','😂'].map(e=>`<button class="like-btn" data-mk="${key}" data-em="${e}" onclick="toggleLike('${key}','${e}')">${e}</button>`).join('');el.className='msg';el.innerHTML=`<div class="msg-top"><div class="msg-av" style="background:${AVC2[m.name?m.name.charCodeAt(0)%AVC2.length:0]}">${(m.name||'?')[0]}</div><span class="msg-who${me?' me':''}">${m.name||'?'}</span><span class="msg-when">${t}</span></div>${body}<div class="msg-likes">${lks}</div>`;}
  box.appendChild(el);if(!silent)box.scrollTop=box.scrollHeight;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let pushT=null;
window.__push=()=>{if(remoteUpdate||!db)return;clearTimeout(pushT);pushT=setTimeout(()=>set(ref(db,`rooms/${roomId}/state`),{players,arrows,ball,screens,by:myName,ts:serverTimestamp()}),80);};
window.saveTactic=()=>{if(!db){alert('單機模式無法儲存');return;}const n=prompt('戰術名稱：','新戰術')||'新戰術';set(ref(db,`rooms/${roomId}/tactics/${Date.now()}`),{name:n,players,arrows,ball,screens,savedBy:myName});alert('✅ 戰術「'+n+'」已儲存！');};
window.copyLink=()=>{navigator.clipboard?.writeText(document.getElementById('share-link').value).catch(()=>{});const b=document.querySelector('.ml-copy');if(b){b.textContent='✓ 已複製';setTimeout(()=>b.textContent='複製',2000);}};
window.shareLine=()=>window.open('https://line.me/R/msg/text/?'+encodeURIComponent(document.getElementById('share-link').value));
</script>

<!-- CANVAS ENGINE -->
<script>
const CV=document.getElementById('court'),ct=CV.getContext('2d');
let CW,CH,SC,mY,BKL,BKR,KH,FTL,FTR,FTR_,RAR,A3R,C3O,C3D;
function initCourtDims(){
  const a=document.getElementById('ca');
  let aw=a.clientWidth-10,ah=a.clientHeight-10;
  let cw=Math.min(aw,ah*(30/17)),ch=cw*(17/30);
  if(ch>ah){ch=ah;cw=ch*(30/17);}
  CW=Math.floor(cw);CH=Math.floor(ch);CV.width=CW;CV.height=CH;
  const mx=CW/30,my=CH/17;
  SC=(CW-mx*2)/28;mY=CH/2;
  BKL=mx+1.575*SC;BKR=CW-mx-1.575*SC;KH=2.45*SC;
  FTL=mx+5.8*SC;FTR=CW-mx-5.8*SC;FTR_=1.8*SC;RAR=1.25*SC;
  A3R=6.75*SC;C3O=(7.5-.9)*SC;C3D=Math.sqrt(A3R**2-C3O**2);
}
const m=v=>v*SC,lw=()=>Math.max(1,CW/580);
function drawFloor(){
  ct.fillStyle='#111B28';ct.fillRect(0,0,CW,CH);
  const mx=CW/30,my=CH/17;
  const g=ct.createLinearGradient(mx,my,CW-mx,my);
  g.addColorStop(0,'#C8834A');g.addColorStop(.5,'#D4944F');g.addColorStop(1,'#C07840');
  ct.fillStyle=g;ct.fillRect(mx,my,CW-mx*2,CH-my*2);
  ct.save();ct.globalAlpha=.07;ct.strokeStyle='#000';ct.lineWidth=.5;
  for(let y=my;y<CH-my;y+=m(.5)){ct.beginPath();ct.moveTo(mx,y);ct.lineTo(CW-mx,y);ct.stroke();}
  ct.restore();
  ct.save();ct.globalAlpha=.22;ct.fillStyle='#0A1420';
  ct.fillRect(0,0,mx,CH);ct.fillRect(CW-mx,0,mx,CH);ct.fillRect(0,0,CW,my);ct.fillRect(0,CH-my,CW,my);
  ct.restore();
}
function ln(x1,y1,x2,y2){ct.beginPath();ct.moveTo(x1,y1);ct.lineTo(x2,y2);ct.stroke();}
function arc(cx,cy,r,a1,a2,ccw){ct.beginPath();ct.arc(cx,cy,r,a1,a2,ccw||false);ct.stroke();}
function drawCourt(){
  drawFloor();
  const mx=CW/30,my=CH/17;
  ct.fillStyle='rgba(20,50,95,.3)';
  ct.fillRect(mx,mY-KH,FTL-mx,KH*2);ct.fillRect(FTR,mY-KH,CW-mx-FTR,KH*2);
  ct.strokeStyle='#fff';ct.lineWidth=lw();
  ct.strokeRect(mx,my,CW-mx*2,CH-my*2);ln(CW/2,my,CW/2,CH-my);
  arc(CW/2,mY,FTR_,0,Math.PI*2);
  ct.beginPath();ct.arc(CW/2,mY,Math.max(2,lw()*1.5),0,Math.PI*2);ct.fillStyle='#fff';ct.fill();
  drawH(mx,my,BKL,FTL,1);drawH(mx,my,BKR,FTR,-1);
}
function drawH(mx,my,bk,ftl,d){
  const rx=d>0?mx:CW-mx;ct.strokeStyle='#fff';ct.lineWidth=lw();
  ln(rx,mY-KH,ftl,mY-KH);ln(rx,mY+KH,ftl,mY+KH);ln(ftl,mY-KH,ftl,mY+KH);
  [m(1.8),m(3),m(4.2)].forEach(dd=>{const x=d>0?mx+dd:CW-mx-dd;ln(x,mY-KH,x,mY-KH-m(.22));ln(x,mY+KH,x,mY+KH+m(.22));});
  ct.beginPath();ct.arc(ftl,mY,FTR_,d>0?-Math.PI/2:Math.PI/2,d>0?Math.PI/2:-Math.PI/2,d>0);ct.stroke();
  ct.save();ct.setLineDash([m(.28),m(.18)]);ct.beginPath();ct.arc(ftl,mY,FTR_,d>0?Math.PI/2:-Math.PI/2,d>0?-Math.PI/2:Math.PI/2,d>0);ct.stroke();ct.setLineDash([]);ct.restore();
  ct.beginPath();ct.arc(bk,mY,RAR,d>0?-Math.PI/2:Math.PI/2,d>0?Math.PI/2:-Math.PI/2,d>0);ct.stroke();
  const ax=bk+d*C3D;ln(rx,mY-C3O,ax,mY-C3O);ln(rx,mY+C3O,ax,mY+C3O);
  ct.beginPath();ct.arc(bk,mY,A3R,Math.atan2(-C3O,d*C3D),Math.atan2(C3O,d*C3D),d<0);ct.stroke();
  ct.lineWidth=lw()*1.6;ln(rx+d*m(1.2),mY-m(.9),rx+d*m(1.2),mY+m(.9));ct.lineWidth=lw();
  ct.beginPath();ct.arc(bk,mY,m(.225),0,Math.PI*2);ct.strokeStyle='#F4732A';ct.lineWidth=lw()*1.8;ct.stroke();ct.lineWidth=lw();ct.strokeStyle='#fff';
}

// STATE
let tool='select',col='#E24B4A',pSize=17;
let players=[],arrows=[],ball=null,screens=[];
let sel=null,drawing=false,drag=null,dox,doy,sx,sy,pending=null,pctr=1;
let history=[],seqSteps=[],seqPhase='pick',seqIdx=-1;
const PR=()=>pSize;
function setPS(v){pSize=parseInt(v);document.getElementById('tb-sz-v').textContent=v;render();}
window.setPS=setPS;
function snap(){history.push({players:JSON.parse(JSON.stringify(players)),arrows:JSON.parse(JSON.stringify(arrows)),ball:ball?{...ball}:null,screens:JSON.parse(JSON.stringify(screens))});if(history.length>30)history.shift();}
function undoAct(){if(!history.length)return;const p=history.pop();players=p.players;arrows=p.arrows;ball=p.ball;screens=p.screens;render();if(window.__push)window.__push();}
window.undoAct=undoAct;
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)){e.preventDefault();undoAct();}});

function setTool(t,btn){
  tool=t;sel=null;
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('act'));if(btn)btn.classList.add('act');
  if(t==='seq'){document.getElementById('seq-pill').classList.add('show');seqPhase='pick';}
  else document.getElementById('seq-pill').classList.remove('show');
  render();
}
window.setTool=setTool;
function setCol(c,el){col=c;document.querySelectorAll('.t-color').forEach(d=>d.classList.remove('act'));el.classList.add('act');}
window.setCol=setCol;
function buildColors(){
  const row=document.getElementById('tb-colors');
  ['#E24B4A','#378ADD','#4ADE80','#FACC15','#A78BFA'].forEach((c,i)=>{
    const el=document.createElement('div');el.className='t-color'+(i===0?' act':'');
    el.style.background=c;el.onclick=()=>setCol(c,el);row.appendChild(el);
  });
}

// DRAW
function drawArrow(a,isSel){
  const{x1,y1,x2,y2,cx,cy,style,color}=a;
  ct.save();ct.strokeStyle=isSel?'#FFD700':(color||'#fff');ct.lineWidth=isSel?2.5:Math.max(1.5,CW/460);
  if(isSel)ct.setLineDash([6,3]);else if(style==='pass')ct.setLineDash([m(.3),m(.18)]);else if(style==='drib')ct.lineWidth*=1.3;
  ct.beginPath();ct.moveTo(x1,y1);
  if(cx!==undefined){ct.quadraticCurveTo(cx,cy,x2,y2);}
  else if(style==='drib'){const dx=x2-x1,dy=y2-y1,n=4;for(let i=0;i<=n;i++){const t=i/n,px=x1+t*dx,py=y1+t*dy,perp=Math.sqrt(dx*dx+dy*dy)||1,off=(i%2===0?1:-1)*m(.3);if(i===0)ct.moveTo(px,py);else ct.quadraticCurveTo(px-dy/perp*off,py+dx/perp*off,px,py);}
  } else {ct.lineTo(x2,y2);}
  ct.stroke();ct.setLineDash([]);
  const ang=Math.atan2(y2-(cy||y1),x2-(cx||x1)),h=Math.max(8,CW/75);
  ct.fillStyle=isSel?'#FFD700':(color||'#fff');ct.beginPath();ct.moveTo(x2,y2);ct.lineTo(x2-h*Math.cos(ang-.42),y2-h*Math.sin(ang-.42));ct.lineTo(x2-h*Math.cos(ang+.42),y2-h*Math.sin(ang+.42));ct.closePath();ct.fill();
  if(isSel&&cx!==undefined){ct.save();ct.strokeStyle='rgba(255,215,0,.5)';ct.lineWidth=1;ct.setLineDash([3,3]);ct.beginPath();ct.moveTo(x1,y1);ct.lineTo(cx,cy);ct.moveTo(cx,cy);ct.lineTo(x2,y2);ct.stroke();ct.setLineDash([]);ct.beginPath();ct.arc(cx,cy,7,0,Math.PI*2);ct.fillStyle='#FFD700';ct.fill();ct.restore();}
  ct.restore();
}
function drawScr(s,isSel){ct.save();ct.strokeStyle=isSel?'#FFD700':s.color;ct.lineWidth=Math.max(2,CW/340);const sz=PR()*.92;ct.strokeRect(s.x-sz/2,s.y-sz/2,sz,sz);ct.restore();}
function drawPl(p,isSel){
  const r=PR();ct.save();
  if(isSel){ct.beginPath();ct.arc(p.x,p.y,r+5,0,Math.PI*2);ct.strokeStyle='#FFD700';ct.lineWidth=2.5;ct.stroke();}
  ct.beginPath();ct.arc(p.x+1,p.y+2,r+1,0,Math.PI*2);ct.fillStyle='rgba(0,0,0,.28)';ct.fill();
  ct.beginPath();ct.arc(p.x,p.y,r,0,Math.PI*2);ct.fillStyle=p.color;ct.fill();
  ct.strokeStyle='rgba(255,255,255,.75)';ct.lineWidth=1.8;ct.stroke();
  if(p.jersey){ct.beginPath();ct.arc(p.x+r*.65,p.y-r*.65,r*.38,0,Math.PI*2);ct.fillStyle='rgba(0,0,0,.75)';ct.fill();ct.font=`bold ${Math.max(7,r*.32)}px Barlow Condensed,sans-serif`;ct.fillStyle='#fff';ct.textAlign='center';ct.textBaseline='middle';ct.fillText(p.jersey,p.x+r*.65,p.y-r*.65);}
  const lbl=p.name||String(p.num),fs=lbl.length>2?Math.max(8,r*.62):Math.max(10,r*.82);
  ct.fillStyle='#fff';ct.font=`bold ${fs}px Barlow Condensed,sans-serif`;ct.textAlign='center';ct.textBaseline='middle';ct.fillText(lbl,p.x,p.y);
  if(p.name){const tf=Math.max(8,r*.65);ct.font=`${tf}px Noto Sans TC,sans-serif`;const tw=ct.measureText(p.name).width+8;ct.fillStyle='rgba(0,0,0,.72)';ct.beginPath();ct.roundRect(p.x-tw/2,p.y+r+2,tw,tf+5,3);ct.fill();ct.fillStyle='#fff';ct.fillText(p.name,p.x,p.y+r+tf/2+4.5);}
  const si=seqSteps.findIndex(s=>s.pi===players.indexOf(p));
  if(si>=0){ct.beginPath();ct.arc(p.x-r*.65,p.y-r*.65,r*.42,0,Math.PI*2);ct.fillStyle='#FBBF24';ct.fill();ct.font=`bold ${Math.max(8,r*.36)}px Barlow Condensed,sans-serif`;ct.fillStyle='#000';ct.textAlign='center';ct.textBaseline='middle';ct.fillText(si+1,p.x-r*.65,p.y-r*.65);}
  ct.restore();
}
function drawBall(b,isSel){
  const r=Math.max(9,pSize*.55);ct.save();
  if(isSel){ct.beginPath();ct.arc(b.x,b.y,r+5,0,Math.PI*2);ct.strokeStyle='#FFD700';ct.lineWidth=2.5;ct.stroke();}
  ct.beginPath();ct.arc(b.x+1,b.y+2,r+1,0,Math.PI*2);ct.fillStyle='rgba(0,0,0,.28)';ct.fill();
  ct.beginPath();ct.arc(b.x,b.y,r,0,Math.PI*2);ct.fillStyle='#F4732A';ct.fill();
  ct.strokeStyle='rgba(0,0,0,.4)';ct.lineWidth=1.2;ct.stroke();ct.strokeStyle='rgba(0,0,0,.35)';ct.lineWidth=1;
  ct.beginPath();ct.arc(b.x,b.y,r,.3,Math.PI+.3);ct.stroke();ct.beginPath();ct.moveTo(b.x-r,b.y);ct.lineTo(b.x+r,b.y);ct.stroke();ct.restore();
}
function drawSeqPrev(){
  seqSteps.forEach((s,i)=>{
    const p=players[s.pi];if(!p)return;
    ct.save();ct.strokeStyle='rgba(251,191,36,.45)';ct.lineWidth=1.5;ct.setLineDash([4,4]);ct.beginPath();ct.moveTo(p.x,p.y);ct.lineTo(s.tx,s.ty);ct.stroke();ct.setLineDash([]);
    ct.beginPath();ct.arc(s.tx,s.ty,PR()*.5,0,Math.PI*2);ct.fillStyle='rgba(251,191,36,.25)';ct.fill();ct.strokeStyle='rgba(251,191,36,.55)';ct.lineWidth=1;ct.stroke();
    ct.font=`bold ${Math.max(8,PR()*.45)}px Barlow Condensed,sans-serif`;ct.fillStyle='#FBBF24';ct.textAlign='center';ct.textBaseline='middle';ct.fillText(i+1,s.tx,s.ty);ct.restore();
  });
  if(seqPhase==='target'&&seqIdx>=0&&players[seqIdx]){const p=players[seqIdx],r=PR();ct.save();ct.beginPath();ct.arc(p.x,p.y,r+6,0,Math.PI*2);ct.strokeStyle='#FBBF24';ct.lineWidth=2;ct.setLineDash([4,3]);ct.stroke();ct.setLineDash([]);ct.restore();}
}
function render(){
  if(!CW)return;drawCourt();drawSeqPrev();
  screens.forEach((s,i)=>drawScr(s,sel&&sel.type==='scr'&&sel.i===i));
  arrows.forEach((a,i)=>drawArrow(a,sel&&sel.type==='arr'&&sel.i===i));
  players.forEach((p,i)=>drawPl(p,sel&&sel.type==='ply'&&sel.i===i));
  if(ball)drawBall(ball,sel&&sel.type==='bal');
  updPlayers();
}
function updPlayers(){
  const list=document.getElementById('player-list-el');if(!list)return;
  list.innerHTML='';players.forEach((p,i)=>{
    const row=document.createElement('div');row.className='pi'+(sel&&sel.type==='ply'&&sel.i===i?' sel':'');
    const si=seqSteps.findIndex(s=>s.pi===i);const badge=si>=0?`<span class="seq-badge">步${si+1}</span>`:'';

    const nd=row.querySelector('.pi-n'),ni=row.querySelector('.pi-ni');

    row.onclick=e=>{if(e.target.classList.contains('pi-del')||e.target===ni||e.target===nd)return;sel={type:'ply',i};render();};

window.rmP=(i,e)=>{e.stopPropagation();snap();players.splice(i,1);seqSteps=seqSteps.filter(s=>s.pi!==i).map(s=>({...s,pi:s.pi>i?s.pi-1:s.pi}));if(sel&&sel.type==='ply'&&sel.i===i)sel=null;render();if(window.__push)window.__push();};

// INPUT
function getPos(e){
  const r=CV.getBoundingClientRect(),sx2=CV.width/r.width,sy2=CV.height/r.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-r.left)*sx2,y:(cy-r.top)*sy2};
}
function hitTest(pos){
  const r=PR();
  for(let i=players.length-1;i>=0;i--)if(Math.hypot(pos.x-players[i].x,pos.y-players[i].y)<r+6)return{type:'ply',i};
  if(ball&&Math.hypot(pos.x-ball.x,pos.y-ball.y)<Math.max(9,pSize*.55)+6)return{type:'bal'};
  for(let i=screens.length-1;i>=0;i--){const s=screens[i],sz=PR()*.9;if(Math.abs(pos.x-s.x)<sz&&Math.abs(pos.y-s.y)<sz)return{type:'scr',i};}
  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i];
    if(a.cx!==undefined&&Math.hypot(pos.x-a.cx,pos.y-a.cy)<10)return{type:'ctrl',i};
    const dx=a.x2-a.x1,dy=a.y2-a.y1,t=Math.max(0,Math.min(1,((pos.x-a.x1)*dx+(pos.y-a.y1)*dy)/(dx*dx+dy*dy||1)));
    if(Math.hypot(pos.x-(a.x1+t*dx),pos.y-(a.y1+t*dy))<12)return{type:'arr',i};
  }
  return null;
}
function showNP(p){
  pending=p;const np=document.getElementById('npw'),ni=document.getElementById('np-n'),nn=document.getElementById('np-num');
  const r=CV.getBoundingClientRect(),area=document.getElementById('ca'),ar=area.getBoundingClientRect();
  let left=p.x*(r.width/CV.width)+r.left-ar.left+12,top=p.y*(r.height/CV.height)+r.top-ar.top+12;
  if(left+180>ar.width)left=p.x*(r.width/CV.width)+r.left-ar.left-192;
  if(top+120>ar.height)top=p.y*(r.height/CV.height)+r.top-ar.top-125;
  np.style.left=left+'px';np.style.top=top+'px';np.style.display='block';ni.value='';nn.value='';setTimeout(()=>ni.focus(),80);
}
function confirmNP(){const v=document.getElementById('np-n').value.trim(),n=document.getElementById('np-num').value.trim();if(pending){pending.name=v||null;if(n)pending.jersey=parseInt(n);}document.getElementById('npw').style.display='none';pending=null;render();if(window.__push)window.__push();}
function cancelNP(){document.getElementById('npw').style.display='none';pending=null;render();}
window.confirmNP=confirmNP;window.cancelNP=cancelNP;
document.getElementById('np-n').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('np-num').focus();if(e.key==='Escape')cancelNP();});
document.getElementById('np-num').addEventListener('keydown',e=>{if(e.key==='Enter')confirmNP();if(e.key==='Escape')cancelNP();});

// Long press for name prompt (mobile)
let lpTimer=null;
function hDown(e){
  const pos=getPos(e);document.getElementById('npw').style.display='none';
  if(tool==='seq'){
    if(seqPhase==='pick'){const h=hitTest(pos);if(h&&h.type==='ply'){seqIdx=h.i;seqPhase='target';document.getElementById('seq-info').textContent=`步驟${seqSteps.length+1}：點目標位置`;}}
    else{seqSteps.push({pi:seqIdx,tx:pos.x,ty:pos.y});seqPhase='pick';seqIdx=-1;document.getElementById('seq-info').textContent=`✅ ${seqSteps.length}步，繼續或播放`;render();}
    return;
  }
  if(tool==='player'){snap();const p={x:pos.x,y:pos.y,color:col,num:pctr++,name:null,jersey:null};players.push(p);sel={type:'ply',i:players.length-1};render();showNP(p);return;}
  if(tool==='ball'){snap();ball={x:pos.x,y:pos.y};sel={type:'bal'};render();if(window.__push)window.__push();return;}
  if(tool==='run'||tool==='pass'||tool==='drib'){drawing=true;sx=pos.x;sy=pos.y;return;}
  if(tool==='screen'){snap();screens.push({x:pos.x,y:pos.y,color:col});sel={type:'scr',i:screens.length-1};render();if(window.__push)window.__push();return;}
  if(tool==='select'){
    const h=hitTest(pos);sel=h;drag=h;if(h){dox=pos.x;doy=pos.y;}
    // long press to rename
    if(h&&h.type==='ply'){lpTimer=setTimeout(()=>{showNP(players[h.i]);lpTimer=null;},500);}
    render();
  }
}
function hMove(e){
  const pos=getPos(e);
  if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
  if((tool==='run'||tool==='pass'||tool==='drib')&&drawing){render();ct.save();ct.strokeStyle='rgba(255,255,255,.4)';ct.lineWidth=Math.max(1.5,CW/460);if(tool==='pass')ct.setLineDash([m(.3),m(.18)]);ct.beginPath();ct.moveTo(sx,sy);ct.lineTo(pos.x,pos.y);ct.stroke();ct.setLineDash([]);ct.restore();return;}
  if(tool==='select'&&drag){
    const dx=pos.x-dox,dy=pos.y-doy;
    if(drag.type==='ply'){players[drag.i].x+=dx;players[drag.i].y+=dy;}
    else if(drag.type==='bal'){ball.x+=dx;ball.y+=dy;}
    else if(drag.type==='arr'){const a=arrows[drag.i];a.x1+=dx;a.y1+=dy;a.x2+=dx;a.y2+=dy;if(a.cx!==undefined){a.cx+=dx;a.cy+=dy;}}
    else if(drag.type==='scr'){screens[drag.i].x+=dx;screens[drag.i].y+=dy;}
    else if(drag.type==='ctrl'){arrows[drag.i].cx+=dx;arrows[drag.i].cy+=dy;}
    dox=pos.x;doy=pos.y;render();if(window.__push)window.__push();
  }
}
function hUp(e){
  if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
  if((tool==='run'||tool==='pass'||tool==='drib')&&drawing){
    const pos=getPos(e);
    if(Math.hypot(pos.x-sx,pos.y-sy)>10){snap();arrows.push({x1:sx,y1:sy,x2:pos.x,y2:pos.y,color:col,style:tool==='pass'?'pass':tool==='drib'?'drib':'run'});if(window.__push)window.__push();}
    drawing=false;render();
  }
  drag=null;
}
function hDbl(e){
  if(tool!=='select')return;const pos=getPos(e),h=hitTest(pos);
  if(h&&h.type==='ply')showNP(players[h.i]);
  if(h&&h.type==='arr'){const a=arrows[h.i];if(a.cx===undefined){a.cx=(a.x1+a.x2)/2;a.cy=(a.y1+a.y2)/2-m(1.5);}else{delete a.cx;delete a.cy;}sel={type:'arr',i:h.i};render();if(window.__push)window.__push();}
}
CV.addEventListener('mousedown',hDown);CV.addEventListener('mousemove',hMove);CV.addEventListener('mouseup',hUp);CV.addEventListener('dblclick',hDbl);
CV.addEventListener('touchstart',e=>{e.preventDefault();hDown(e);},{passive:false});
CV.addEventListener('touchmove',e=>{e.preventDefault();hMove(e);},{passive:false});
CV.addEventListener('touchend',e=>{e.preventDefault();hUp(e);},{passive:false});

function delSel(){if(!sel)return;snap();if(sel.type==='ply')players.splice(sel.i,1);else if(sel.type==='bal')ball=null;else if(sel.type==='arr')arrows.splice(sel.i,1);else if(sel.type==='scr')screens.splice(sel.i,1);sel=null;render();if(window.__push)window.__push();}
window.delSel=delSel;
document.addEventListener('keydown',e=>{if(e.key==='Delete'||e.key==='Backspace'){if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;delSel();}});
function clearAll(){snap();players=[];arrows=[];ball=null;screens=[];sel=null;pctr=1;seqSteps=[];render();if(window.__push)window.__push();}

// ANIMATION
let animFrame=null,animT=0,animPlaying=false,animData=null,animStart=null,animSpd=1,animType='preset',seqAnimData=null;
function toggleAnim(){if(animPlaying){animPlaying=false;cancelAnimationFrame(animFrame);document.getElementById('anim-pb').textContent='▶';}else{animPlaying=true;animStart=null;document.getElementById('anim-pb').textContent='⏸';runAnim();}}
window.toggleAnim=toggleAnim;
function stopAnim(){cancelAnimationFrame(animFrame);animPlaying=false;animT=0;animStart=null;document.getElementById('anim-pill').classList.remove('show');}
window.stopAnim=stopAnim;
function runAnim(){
  if(!animPlaying)return;const now=performance.now();const dur=(animType==='seq'?seqAnimData.dur:animData.dur)/animSpd;
  if(!animStart)animStart=now-animT*dur;animT=Math.min(1,(now-animStart)/dur);
  document.getElementById('anim-prog').textContent=Math.round(animT*100)+'%';
  if(animType==='seq'&&seqAnimData){const fs=seqAnimData.frames;for(let fi=0;fi<fs.length-1;fi++){const f0=fs[fi],f1=fs[fi+1];if(animT>=f0.t&&animT<=f1.t){const frac=(animT-f0.t)/(f1.t-f0.t||1);players.forEach((p,i)=>{p.x=lerp(f0.pos[i].x,f1.pos[i].x,frac);p.y=lerp(f0.pos[i].y,f1.pos[i].y,frac);});break;}}}
  else if(animData){const fs=animData.frames;for(let fi=0;fi<fs.length-1;fi++){const f0=fs[fi],f1=fs[fi+1];if(animT>=f0.t&&animT<=f1.t){const frac=(animT-f0.t)/(f1.t-f0.t||1);if(f1.mv)f1.mv.forEach(mv=>{if(!players[mv.i])return;const sn=fi===0&&f0.snap?f0.snap.players[mv.i]:null;players[mv.i].x=lerp(sn?sn.x:players[mv.i].x,mv.x,frac);players[mv.i].y=lerp(sn?sn.y:players[mv.i].y,mv.y,frac);});if(f1.bl&&ball){const sb=fi===0&&f0.snap?f0.snap.ball:ball;if(sb){ball.x=lerp(sb.x,f1.bl.x,frac);ball.y=lerp(sb.y,f1.bl.y,frac);}}break;}}}
  render();if(animT<1)animFrame=requestAnimationFrame(runAnim);else{animPlaying=false;animT=0;animStart=null;document.getElementById('anim-pb').textContent='▶';}
}
function lerp(a,b,t){return a+(b-a)*t;}
function startAnim(n){
  stopAnim();loadT(n);
  const cx=CW/2,cy=mY;
  const presets={
    pr:{dur:3000,frames:[{t:0,snap:JSON.parse(JSON.stringify({players,ball}))},{t:.4,mv:[{i:0,x:cx*.44,y:cy},{i:1,x:cx*.38,y:cy-CH*.09}],bl:{x:cx*.44,y:cy}},{t:.7,mv:[{i:0,x:cx*.34,y:cy-CH*.13},{i:1,x:cx*.24,y:cy-CH*.17}],bl:{x:cx*.34,y:cy-CH*.13}},{t:1,mv:[{i:0,x:cx*.22,y:cy-CH*.06}],bl:{x:cx*.2,y:cy-CH*.06}}]},
    fb:{dur:2500,frames:[{t:0,snap:JSON.parse(JSON.stringify({players,ball}))},{t:.3,mv:[{i:1,x:cx*.65,y:cy-CH*.2},{i:2,x:cx*.65,y:cy+CH*.2}],bl:{x:cx*.35,y:cy}},{t:.6,mv:[{i:0,x:cx*.55,y:cy}],bl:{x:cx*.65,y:cy-CH*.2}},{t:1,mv:[{i:1,x:cx*.88,y:cy-CH*.1}],bl:{x:cx*.88,y:cy-CH*.1}}]},
  };
  animData=presets[n]||presets.pr;animType='preset';
  document.getElementById('anim-pill').classList.add('show');
  document.getElementById('anim-lbl').textContent={pr:'Pick&Roll',fb:'快攻',horns:'Horns',motion:'Motion'}[n]||'動畫';
  animT=0;animPlaying=false;animStart=null;document.getElementById('anim-pb').textContent='▶';
}
window.startAnim=startAnim;
function clearSeq(){seqSteps=[];seqPhase='pick';seqIdx=-1;document.getElementById('seq-info').textContent='👆 點球員 → 點目標';render();}
function activateSeq(){setTool('seq',document.getElementById('tb-seq'));document.getElementById('seq-pill').classList.add('show');}
window.clearSeq=clearSeq;window.activateSeq=activateSeq;
function playSeq(){
  if(!seqSteps.length){alert('請先設定走位順序！');return;}
  stopAnim();
  const initPos=players.map(p=>({x:p.x,y:p.y}));const frames=[{t:0,pos:initPos.map(p=>({...p}))}];
  seqSteps.forEach((s,i)=>{const pos=JSON.parse(JSON.stringify(frames[i].pos));pos[s.pi]={x:s.tx,y:s.ty};frames.push({t:(i+1)/seqSteps.length,pos});});
  seqAnimData={frames,dur:seqSteps.length*1200};animType='seq';animT=0;animStart=null;animPlaying=false;
  document.getElementById('anim-pill').classList.add('show');document.getElementById('anim-lbl').textContent='順序走位';document.getElementById('anim-pb').textContent='▶';
}
window.playSeq=playSeq;
function exportImg(){const a=document.createElement('a');a.download='hoopboard.png';a.href=CV.toDataURL();a.click();}
window.exportImg=exportImg;

// BOTTOM SHEET
function openSheet(){document.getElementById('sheet').classList.add('open');document.getElementById('sh-ov').classList.add('show');}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sh-ov').classList.remove('show');}
window.openSheet=openSheet;window.closeSheet=closeSheet;
let shStartY=0;
document.getElementById('sheet').addEventListener('touchstart',e=>{shStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('sheet').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-shStartY>70)closeSheet();},{passive:true});

let currentTab='play';
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.s-tab').forEach(el=>el.classList.remove('act'));
  const tab=document.getElementById('stab-'+t);if(tab)tab.classList.add('act');
  if(t==='chat'){unreadN=0;const b=document.getElementById('chat-badge');if(b)b.style.display='none';}
  buildSheetContent(t);
}
window.switchTab=switchTab;

  const body=document.getElementById('sh-body');if(!body)return;
  if(t==='play'){
    body.innerHTML=`
      <div class="psec"><div class="psec-title">在線成員</div><div class="online-list" id="online-list-el"></div></div>
      <div class="psec"><div class="psec-title">⚡ 一鍵戰術</div><div class="tc-grid">
        <div class="tc" onclick="loadT('fb');closeSheet()"><span class="tc-em">⚡</span><div class="tc-name">快攻反擊</div></div>
        <div class="tc" onclick="loadT('pr');closeSheet()"><span class="tc-em">🔄</span><div class="tc-name">Pick&Roll</div></div>
        <div class="tc" onclick="loadT('z23');closeSheet()"><span class="tc-em">🛡</span><div class="tc-name">2-3 區域</div></div>
        <div class="tc" onclick="loadT('box');closeSheet()"><span class="tc-em">📦</span><div class="tc-name">Box 站位</div></div>
        <div class="tc" onclick="loadT('press');closeSheet()"><span class="tc-em">🔥</span><div class="tc-name">全場緊迫</div></div>
        <div class="tc" onclick="loadT('iso');closeSheet()"><span class="tc-em">⭐</span><div class="tc-name">單打空間</div></div>
      </div></div>
      <div class="psec"><div class="psec-title">🎬 動畫示範</div><div class="tc-grid">
        <div class="tc anim" onclick="startAnim('pr');closeSheet()"><span class="tc-em">🔄</span><div class="tc-name">Pick&Roll</div><div class="tc-badge g">▶ 動畫</div></div>
        <div class="tc anim" onclick="startAnim('fb');closeSheet()"><span class="tc-em">⚡</span><div class="tc-name">快攻</div><div class="tc-badge g">▶ 動畫</div></div>
        <div class="tc anim" onclick="startAnim('horns');closeSheet()"><span class="tc-em">🐂</span><div class="tc-name">Horns</div><div class="tc-badge g">▶ 動畫</div></div>
        <div class="tc anim" onclick="startAnim('motion');closeSheet()"><span class="tc-em">🌀</span><div class="tc-name">Motion</div><div class="tc-badge g">▶ 動畫</div></div>
      </div></div>
      <div class="psec"><div class="psec-title">🔢 順序走位</div><div class="tc-grid">
        <div class="tc seq" onclick="activateSeq();closeSheet()"><span class="tc-em">🎯</span><div class="tc-name">開始設定</div><div class="tc-badge y">走位順序</div></div>
        <div class="tc seq" onclick="playSeq()"><span class="tc-em">▶</span><div class="tc-name">播放走位</div><div class="tc-badge y">依序動畫</div></div>
      </div></div>
      <div class="psec" style="border:none"><div class="tc-grid">
        <div class="tc" onclick="clearAll();closeSheet()" style="border-color:rgba(240,82,82,.2)"><span class="tc-em">🗑</span><div class="tc-name" style="color:#F05252">清除全部</div></div>
        <div class="tc" onclick="undoAct()"><span class="tc-em">↩</span><div class="tc-name">復原</div></div>
      </div></div>`;
    // Rerender online list
    const ol=document.getElementById('online-list-el');
    if(ol&&window.__users){window.__users.forEach((u,i)=>{const AVC=['#F4732A','#378ADD','#4ADE80','#FACC15','#A78BFA','#F05252'];const r=document.createElement('div');r.className='o-row';const me=u.name===myName?' <span style="color:#F4732A;font-size:8px">（你）</span>':'';r.innerHTML=`<div class="o-av" style="background:${u.color||AVC[i%AVC.length]}">${u.name[0]}</div><span>${u.name}${me}</span><div class="o-dot"></div>`;ol.appendChild(r);});}
  }
  else if(t==='team'){
    body.innerHTML=`<div class="psec"><div class="psec-title">球員清單</div><div class="pl" id="player-list-el"></div></div>
    <div class="psec" style="border:none"><div class="psec-title">操作說明</div>
    <div style="font-size:10px;color:#7A8899;line-height:1.9">
      • <b style="color:#fff">球員</b> 點擊球場放置<br>
      • <b style="color:#fff">長按</b> 球員開啟改名<br>
      • <b style="color:#fff">右側名稱</b> 點擊直接改名<br>
      • <b style="color:#fff">路線雙擊</b> 加曲線控制點<br>
      • <b style="color:#fff">拖曳黃點</b> 調整路線弧度<br>
      • <b style="color:#fff">順序工具</b> 點球員→點目標→播放
    </div></div>`;
    render();
  }
  else if(t==='sym'){
    body.innerHTML=`<div class="psec" style="border:none"><div class="psec-title">📖 戰術符號說明</div><div class="sym-list" id="sym-list-el"></div></div>`;

  }
  else if(t==='chat'){
    body.innerHTML=`<div class="chat-wrap">
      <div class="chat-msgs" id="chat-msgs-el" style="flex:1;overflow-y:auto;padding:7px 10px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth"><div class="msg-sys">歡迎使用 HoopBoard Ultra 🏀</div></div>
      <div class="chat-ia">
        <div class="stk-strip" id="stk-strip-el"></div>

}

function buildSymList(){
  const list=document.getElementById('sym-list-el');if(!list)return;
  const syms=[
    {name:'跑位（空手切）',desc:'實線＋箭頭，無球跑動路線',draw:mc=>{mc.strokeStyle='#fff';mc.lineWidth=1.5;mc.beginPath();mc.moveTo(2,10);mc.lineTo(24,10);mc.stroke();mc.fillStyle='#fff';mc.beginPath();mc.moveTo(24,10);mc.lineTo(20,7);mc.lineTo(20,13);mc.closePath();mc.fill();}},
    {name:'傳球',desc:'虛線＋箭頭，傳球路線',draw:mc=>{mc.strokeStyle='#4ADE80';mc.lineWidth=1.5;mc.setLineDash([3,2]);mc.beginPath();mc.moveTo(2,10);mc.lineTo(24,10);mc.stroke();mc.setLineDash([]);mc.fillStyle='#4ADE80';mc.beginPath();mc.moveTo(24,10);mc.lineTo(20,7);mc.lineTo(20,13);mc.closePath();mc.fill();}},
    {name:'運球（DHO）',desc:'波浪粗線，持球運球路線',draw:mc=>{mc.strokeStyle='#FBBF24';mc.lineWidth=2;mc.beginPath();mc.moveTo(2,10);mc.quadraticCurveTo(7,5,12,10);mc.quadraticCurveTo(17,15,22,10);mc.stroke();mc.fillStyle='#FBBF24';mc.beginPath();mc.moveTo(24,10);mc.lineTo(20,7);mc.lineTo(20,13);mc.closePath();mc.fill();}},
    {name:'掩護 Screen',desc:'方塊符號，站定設置掩護',draw:mc=>{mc.strokeStyle='#60A5FA';mc.lineWidth=1.8;mc.strokeRect(9,5,12,10);}},
    {name:'曲線節點',desc:'雙擊路線加節點，拖曳黃點調弧度',draw:mc=>{mc.strokeStyle='rgba(255,215,0,.6)';mc.lineWidth=1;mc.setLineDash([2,2]);mc.beginPath();mc.moveTo(2,14);mc.lineTo(13,4);mc.lineTo(24,14);mc.stroke();mc.setLineDash([]);mc.fillStyle='#FFD700';mc.beginPath();mc.arc(13,4,3.5,0,Math.PI*2);mc.fill();}},
    {name:'順序走位',desc:'黃色數字代表走位先後順序',draw:mc=>{mc.fillStyle='#FBBF24';mc.beginPath();mc.arc(8,10,5,0,Math.PI*2);mc.fill();mc.fillStyle='#000';mc.font='bold 8px sans-serif';mc.textAlign='center';mc.textBaseline='middle';mc.fillText('1',8,10);mc.fillStyle='#FBBF24';mc.beginPath();mc.arc(20,10,5,0,Math.PI*2);mc.fill();mc.fillStyle='#000';mc.fillText('2',20,10);}},
  ];
  syms.forEach(s=>{
    const item=document.createElement('div');item.className='sym-item';
    const canvas=document.createElement('canvas');canvas.width=28;canvas.height=20;canvas.style.flexShrink='0';canvas.style.borderRadius='3px';
    const mc=canvas.getContext('2d');s.draw(mc);
    const text=document.createElement('div');text.innerHTML=`<div class="sym-nm">${s.name}</div><div class="sym-dc">${s.desc}</div>`;
    item.appendChild(canvas);item.appendChild(text);list.appendChild(item);
  });
}

function buildStickerStrip(){
  const strip=document.getElementById('stk-strip-el');if(!strip)return;strip.innerHTML='';
  ['🏀','🔥','👍','❤️','😂','🎯','⚡','💪','🏆','✅','😤','🙌','💯','⛹️'].forEach(s=>{
    const btn=document.createElement('button');btn.className='stk-btn';btn.textContent=s;btn.onclick=()=>window.sendStk&&window.sendStk(s);strip.appendChild(btn);
  });
}

window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(()=>{initCourtDims();render();},100);});
window.addEventListener('load',()=>{initCourtDims();render();});
